<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名聊天室</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3204/3204123.png">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1a2e;color:#eee;font-family:Arial}
        #login{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
        #login input{padding:12px;width:200px;border:2px solid #e94560;background:#16213e;color:#fff;border-radius:8px;font-size:16px;text-align:center}
        #login button{padding:12px 40px;background:#e94560;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer}
        .error{color:#ff6b6b}
        #app{display:none;height:100vh}
        #header{padding:15px;background:#16213e;display:flex;justify-content:space-between;align-items:center}
        #messages{flex:1;padding:20px;overflow-y:auto}
        .msg{background:#16213e;padding:10px 15px;margin:10px 0;border-radius:8px;max-width:80%}
        .msg-header{color:#e94560;font-size:12px;margin-bottom:5px}
        .msg-content{font-size:15px}
        #input-area{display:flex;padding:15px;background:#16213e}
        #msgInput{flex:1;padding:12px;border:1px solid #533483;background:#0f3460;color:#fff;border-radius:8px;font-size:15px}
        #sendBtn{padding:12px 20px;background:#e94560;color:white;border:none;border-radius:8px;cursor:pointer;margin-left:10px}
    </style>
</head>
<body>

<div id="login">
    <h1>🎭 匿名聊天室</h1>
    <input id="playerId" placeholder="输入1-8" maxlength="1">
    <button onclick="enterRoom()">进入房间</button>
    <p id="loginError" class="error"></p>
    <p style="color:#888;font-size:12px">房主密码：admin123（仅用于重置房间）</p>
</div>

<div id="app">
    <div id="header">
        <span id="myId"></span>
        <button class="admin-btn" onclick="showAdmin()">房主控制</button>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input id="msgInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
</div>

<div id="privateModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:100;display:flex;align-items:center;justify-content:center" onclick="if(event.target===this)closePrivate()">
    <div style="background:#16213e;padding:20px;border-radius:12px;width:90%;max-width:500px;display:flex;flex-direction:column;max-height:80vh">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
            <h3 id="privateTitle">私聊</h3>
            <button onclick="closePrivate()" style="background:none;border:none;color:#e94560;font-size:24px;cursor:pointer">×</button>
        </div>
        <div id="privateMessages" style="flex:1;overflow-y:auto;background:#0f3460;padding:15px;border-radius:8px;margin-bottom:15px;min-height:200px"></div>
        <div style="display:flex">
            <input id="privateInput" style="flex:1;padding:10px;border-radius:6px;border:1px solid #533483;background:#1a1a2e;color:#fff" placeholder="输入私聊消息..." onkeypress="if(event.key==='Enter')sendPrivate()">
            <button onclick="sendPrivate()" style="padding:10px 20px;background:#e94560;color:white;border:none;border-radius:6px;cursor:pointer;margin-left:10px">发送</button>
        </div>
    </div>
</div>

<div id="adminModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:center;justify-content:center" onclick="if(event.target===this)closeAdmin()">
    <div style="background:#16213e;padding:30px;border-radius:12px;text-align:center">
        <h3 style="color:#e94560;margin-bottom:20px">房主控制面板</h3>
        <p style="margin-bottom:20px;color:#888">此操作将清空所有聊天记录<br>所有人需要重新进入并输入编号</p>
        <button onclick="resetRoom()" style="padding:12px 40px;background:#e94560;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px">⚠️ 重置房间</button>
        <button onclick="closeAdmin()" style="padding:12px 30px;background:#533483;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;margin-left:10px">取消</button>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
// 配置区
const SUPABASE_URL = 'https://mronesaayjtjuhwvzouj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY';
const ADMIN_PASSWORD = 'admin123';

// 全局变量
let supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: false }
});
let myId = null;
let currentPrivateTarget = null;

// 登录函数
async function enterRoom() {
  const input = document.getElementById('playerId').value.trim();
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';

  let num = input.replace(/[^\d]/g, '') || '1';
  num = Math.max(1, Math.min(8, parseInt(num) || 1));
  const id = num + '号';

  const thirtySecondsAgo = new Date(Date.now() - 30000).toISOString();
  const { data: existing } = await supabase
    .from('players')
    .select('*')
    .eq('player_id', id)
    .gt('last_seen', thirtySecondsAgo)
    .maybeSingle();

  if (existing) {
    errorEl.textContent = '该编号已被使用，请换其他编号';
    return;
  }

  myId = id;

  await supabase.from('players').upsert({
    player_id: id,
    last_seen: new Date().toISOString()
  });

  setInterval(() => {
    supabase.from('players').upsert({
      player_id: id,
      last_seen: new Date().toISOString()
    });
  }, 10000);

  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('myId').textContent = '我是：' + myId;

  await supabase.from('messages').insert({
    type: 'system',
    from_id: 'system',
    to_id: 'all',
    content: myId + ' 进入了房间'
  });

  startListeners();
}

// 监听函数
function startListeners() {
  supabase.channel('messages')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMessages())
    .subscribe();

  supabase.channel('players')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => loadPlayers())
    .subscribe();

  loadMessages();
  loadPlayers();
}

// 加载消息
async function loadMessages() {
  const { data: messages } = await supabase
    .from('messages')
    .select('*')
    .order('created_at', { ascending: true })
    .limit(100);

  const container = document.getElementById('messages');
  container.innerHTML = '';
  if (!messages) return;

  messages.forEach(msg => {
    if (msg.type === 'system') {
      const div = document.createElement('div');
      div.style.cssText = 'text-align:center; color:#888; margin:10px 0; font-size:13px;';
      div.textContent = msg.content;
      container.appendChild(div);
      return;
    }

    if (msg.type === 'private' && msg.from_id !== myId && msg.to_id !== myId) return;

    const div = document.createElement('div');
    div.className = 'msg' + (msg.type === 'private' ? ' msg-private' : '');

    const header = document.createElement('div');
    header.className = 'msg-header';
    header.textContent = msg.type === 'private'
      ? '🔒 ' + msg.from_id + ' → ' + msg.to_id + ' (私聊)'
      : msg.from_id;

    const content = document.createElement('div');
    content.className = 'msg-content';
    content.textContent = msg.content;

    div.appendChild(header);
    div.appendChild(content);
    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

// 加载在线玩家
async function loadPlayers() {
  const thirtySecondsAgo = new Date(Date.now() - 30000).toISOString();
  const { data: players } = await supabase
    .from('players')
    .select('*')
    .gt('last_seen', thirtySecondsAgo)
    .order('player_id');

  const container = document.getElementById('playerList');
  if (!container) return;
  container.innerHTML = '';
  if (!players) return;

  players.forEach(p => {
    const div = document.createElement('div');
    div.className = 'player-item';
    div.onclick = () => openPrivate(p.player_id);

    const avatar = document.createElement('div');
    avatar.className = 'player-avatar';
    avatar.textContent = p.player_id.replace('号', '');

    const name = document.createElement('div');
    name.innerHTML = `<div class="player-name">${p.player_id}</div><div class="online">● 在线</div>`;

    div.appendChild(avatar);
    div.appendChild(name);
    container.appendChild(div);
  });
}

// 公屏发送
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !myId) return;

  await supabase.from('messages').insert({
    type: 'public',
    from_id: myId,
    to_id: 'all',
    content: content
  });

  input.value = '';
}

// 私聊
function openPrivate(targetId) {
  if (targetId === myId) {
    alert('不能给自己发私聊');
    return;
  }
  currentPrivateTarget = targetId;
  document.getElementById('privateTitle').textContent = '与 ' + targetId + ' 私聊';
  document.getElementById('privateModal').style.display = 'flex';
  loadPrivateMessages();
}

function closePrivate() {
  document.getElementById('privateModal').style.display = 'none';
  currentPrivateTarget = null;
}

async function loadPrivateMessages() {
  if (!currentPrivateTarget || !myId) return;

  const { data: messages } = await supabase
    .from('messages')
    .select('*')
    .eq('type', 'private')
    .or(`and(from_id.eq.${myId},to_id.eq.${currentPrivateTarget}),and(from_id.eq.${currentPrivateTarget},to_id.eq.${myId})`)
    .order('created_at', { ascending: true });

  const container = document.getElementById('privateMessages');
  container.innerHTML = '';
  if (!messages) return;

  messages.forEach(msg => {
    const div = document.createElement('div');
    div.style.cssText = 'margin-bottom:10px; padding:8px; background:' +
      (msg.from_id === myId ? '#e94560' : '#533483') + '; border-radius:6px; color:#fff;';
    div.innerHTML = `<small>${msg.from_id}</small><br>${msg.content}`;
    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

async function sendPrivate() {
  const input = document.getElementById('privateInput');
  const content = input.value.trim();
  if (!content || !currentPrivateTarget || !myId) return;

  await supabase.from('messages').insert({
    type: 'private',
    from_id: myId,
    to_id: currentPrivateTarget,
    content: content
  });

  input.value = '';
  loadPrivateMessages();
}

// 管理员
function showAdmin() {
  const pwd = prompt('请输入房主密码：');
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('adminModal').style.display = 'flex';
  } else if (pwd !== null) {
    alert('密码错误');
  }
}

function closeAdmin() {
  document.getElementById('adminModal').style.display = 'none';
}

async function resetRoom() {
  if (!confirm('确定要重置房间吗？所有聊天记录将被清空！')) return;

  await supabase.from('messages').delete().neq('id', 0);
  await supabase.from('players').delete().neq('id', 0);

  alert('房间已重置，请所有人重新进入');
  location.reload();
}

// 自动清理离线玩家
window.addEventListener('load', () => {
  setInterval(async () => {
    const expire = new Date(Date.now() - 30000).toISOString();
    await supabase.from('players').delete().lt('last_seen', expire);
  }, 30000);
});
</script>
</body>
</html>
