<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名聊天室</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1a2e;color:#eee;font-family:Arial}
        #login{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
        input,button{padding:10px;border-radius:6px}
        button{background:#e94560;color:white;border:none}
        #app{display:none;height:100vh;display:flex;flex-direction:column}
        #messages{flex:1;padding:20px;overflow-y:auto}
        .msg{background:#16213e;padding:10px;margin:10px 0;border-radius:8px}
    </style>
</head>

<body>
<div id="login">
    <h1>匿名聊天室</h1>
    <input id="playerId" placeholder="输入1-8" maxlength="1">
    <button onclick="enterRoom()">进入房间</button>
    <p id="err" style="color:red"></p>
</div>

<div id="app">
    <div style="padding:10px;background:#16213e">
        <span id="myId"></span>
    </div>
    <div id="messages"></div>
    <div style="display:flex;padding:10px">
        <input id="msgInput" style="flex:1" onkeydown="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()">发送</button>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
// ==================== 你的配置 ====================
const SUPABASE_URL = "https://mronesaayjtjuhwvzouj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY";

// 客户端
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: false }
});

let myId = null;

// 自动刷新（强制实时）
setInterval(loadMessages, 1000);

// ==================== 进入房间 ====================
async function enterRoom() {
  let v = document.getElementById("playerId").value.trim() || "1";
  let id = v.replace(/\D/g, "") + "号";

  let { data: exist } = await client
    .from("players")
    .select("*")
    .eq("player_id", id)
    .gt("last_seen", new Date(Date.now() - 30000).toISOString())
    .maybeSingle();

  if (exist) {
    document.getElementById("err").innerText = "已被占用";
    return;
  }

  myId = id;
  await client.from("players").upsert({
    player_id: id,
    last_seen: new Date().toISOString()
  });

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("myId").innerText = "我是：" + myId;
}

// ==================== 加载消息（每秒自动刷新） ====================
async function loadMessages() {
  let { data } = await client
    .from("messages")
    .select("*")
    .order("created_at", { ascending: true });

  let dom = document.getElementById("messages");
  dom.innerHTML = "";
  data.forEach(m => {
    let d = document.createElement("div");
    d.className = "msg";
    d.innerText = m.from_id + "：" + m.content;
    dom.appendChild(d);
  });
  dom.scrollTop = dom.scrollHeight;
}

// ==================== 发送消息 ====================
async function sendMessage() {
  let t = document.getElementById("msgInput").value.trim();
  if (!t || !myId) return;

  await client.from("messages").insert({
    from_id: myId,
    content: t,
    to_id: "all"
  });

  document.getElementById("msgInput").value = "";
  loadMessages();
}
</script>
</body>
</html>
