<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: #0f172a;
            color: #f1f5f9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 登录界面 */
        #login {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        #login h1 {
            color: #ec4899;
            font-size: 28px;
            margin-bottom: 10px;
        }

        #playerId {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        #login button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: #ec4899;
            color: white;
            font-size: 16px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #login button:active {
            opacity: 0.8;
        }

        .error {
            color: #f43f5e;
            font-size: 14px;
        }

        /* 主界面 */
        #app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        #header {
            padding: 16px;
            background: #1e293b;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            border-bottom: 1px solid #334155;
        }

        /* 消息区域 */
        #messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 系统提示 */
        .msg-system {
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            margin: 8px 0;
        }

        /* 别人的消息 */
        .msg-other {
            align-self: flex-start;
            background: #1e293b;
            padding: 10px 14px;
            border-radius: 14px 14px 14px 4px;
            max-width: 75%;
        }

        .msg-other .name {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        /* 自己的消息 */
        .msg-me {
            align-self: flex-end;
            background: #ec4899;
            color: white;
            padding: 10px 14px;
            border-radius: 14px 14px 4px 14px;
            max-width: 75%;
        }

        /* 输入框 */
        #input-area {
            display: flex;
            padding: 12px;
            background: #1e293b;
            gap: 8px;
            border-top: 1px solid #334155;
        }

        #msgInput {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: none;
            background: #334155;
            color: white;
            outline: none;
            font-size: 15px;
        }

        #sendBtn {
            padding: 12px 20px;
            border-radius: 24px;
            background: #ec4899;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- 登录 -->
<div id="login">
    <h1>🎭 匿名聊天室</h1>
    <input id="playerId" placeholder="输入 1-8 进入房间" maxlength="1">
    <button onclick="enterRoom()">进入房间</button>
    <p id="loginError" class="error"></p>
</div>

<!-- 主界面 -->
<div id="app">
    <div id="header">
        <span id="myId"></span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input id="msgInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
// ==================== 配置 ====================
const SUPABASE_URL = "https://mronesaayjtjuhwvzouj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: false }
});

let myId = null;

// ==================== 进入房间 ====================
async function enterRoom() {
  const input = document.getElementById('playerId').value.trim();
  const err = document.getElementById('loginError');
  err.innerText = '';

  let num = input.replace(/\D/g, '') || '1';
  num = Math.max(1, Math.min(8, num));
  const id = num + '号';

  const timeLimit = new Date(Date.now() - 30000).toISOString();
  const { data: exist } = await supabaseClient
    .from('players')
    .select('*')
    .eq('player_id', id)
    .gt('last_seen', timeLimit)
    .maybeSingle();

  if (exist) {
    err.innerText = '编号已被占用';
    return;
  }

  myId = id;

  await supabaseClient.from('players').upsert({
    player_id: id,
    last_seen: new Date().toISOString()
  });

  // 显示主界面
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myId').innerText = '我是：' + myId;

  // 自动刷新
  setInterval(loadMessages, 500);
}

// ==================== 加载消息（区分自己/别人） ====================
async function loadMessages() {
  const { data: msgList } = await supabaseClient
    .from('messages')
    .select('*')
    .order('created_at', { ascending: true });

  const dom = document.getElementById('messages');
  let html = '';

  msgList.forEach(m => {
    // 系统消息
    if (m.type === 'system') {
      html += `<div class="msg-system">${m.content}</div>`;
      return;
    }

    // 自己发的
    if (m.from_id === myId) {
      html += `
        <div class="msg-me">
          ${m.content}
        </div>
      `;
    }
    // 别人发的
    else {
      html += `
        <div class="msg-other">
          <div class="name">${m.from_id}</div>
          ${m.content}
        </div>
      `;
    }
  });

  dom.innerHTML = html;
  dom.scrollTop = dom.scrollHeight;
}

// ==================== 发送消息 ====================
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !myId) return;

  await supabaseClient.from('messages').insert({
    type: 'public',
    from_id: myId,
    to_id: 'all',
    content: content
  });

  input.value = '';
  loadMessages();
}
</script>
</body>
</html>
