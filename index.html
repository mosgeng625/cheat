<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔞20岁的少年心事🔞</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  body {
    background: #111318;
    color: #eee;
    max-width: 500px;
    margin: 0 auto;
  }

  /* 登录 */
  #login {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
  }

  .login-card {
    background: #252a33;
    padding: 40px 30px;
    border-radius: 20px;
    width: 100%;
    text-align: center;
  }

  .login-card h1 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #fff;
  }

  .login-card p {
    color: #999;
    margin-bottom: 20px;
  }

  #playerId {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2d323d;
    color: #fff;
    text-align: center;
    margin-bottom: 15px;
  }

  #loginBtn {
    width: 100%;
    padding: 12px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
  }

  /* 主界面 */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }

  #header {
    background: #252a33;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #privateStatus {
    font-size: 14px;
    color: #aaa;
  }

  #endPrivateBtn {
    background: #ef4444;
    color: #fff;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    display: none;
  }

  /* 消息 */
  #messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .sys {
    align-self: center;
    background: #333;
    color: #aaa;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
  }

  .msg {
    display: flex;
    gap: 8px;
    max-width: 75%;
  }

  .msg.me {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .avatar {
    width: 34px;
    height: 34px;
    background: #555;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    flex-shrink: 0;
  }

  .bubble {
    background: #2d323d;
    padding: 8px 12px;
    border-radius: 8px;
    line-height: 1.4;
  }

  .msg.me .bubble {
    background: #07c160;
    color: #fff;
  }

  /* 输入框 */
  #inputArea {
    display: flex;
    padding: 10px;
    background: #252a33;
    gap: 8px;
  }

  #msgInput {
    flex: 1;
    padding: 10px 14px;
    border-radius: 20px;
    border: none;
    background: #1a1d24;
    color: #fff;
    outline: none;
  }

  #sendBtn {
    padding: 10px 16px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
  }

  /* 弹窗 */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  .modalBox {
    background: #252a33;
    padding: 25px;
    border-radius: 14px;
    width: 90%;
    max-width: 350px;
    text-align: center;
  }

  .btnGroup {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }

  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .ok {
    background: #07c160;
    color: #fff;
  }

  .no {
    background: #555;
    color: #fff;
  }
</style>
</head>

<body>

<!-- 登录 -->
<div id="login">
  <div class="login-card">
    <h1>🔞20岁的少年心事🔞</h1>
    <p>输入 1‑8 进入房间</p>
    <input id="playerId" placeholder="输入编号" maxlength="1">
    <button id="loginBtn" onclick="login()">进入房间</button>
  </div>
</div>

<!-- 主界面 -->
<div id="app">
  <div id="header">
    <span id="myId"></span>
    <span id="privateStatus">群聊中</span>
    <button id="endPrivateBtn" onclick="endPrivate()">结束私聊</button>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="msgInput" placeholder="输入消息..." onkeypress="event.key==='Enter'&&send()">
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>

<!-- 私聊申请弹窗 -->
<div id="privateModal" class="modal">
  <div class="modalBox">
    <h3 id="modalText"></h3>
    <div class="btnGroup">
      <button class="btn ok" onclick="acceptPrivate()">同意</button>
      <button class="btn no" onclick="rejectPrivate()">拒绝</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const supabase = supabase.createClient(
  "https://mronesaayjtjuhwvzouj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY"
);

let me = null;
let mode = "group";
let privateTo = null;

// 登录
async function login() {
  let v = document.getElementById('playerId').value.trim() || '1';
  v = v.replace(/\D/g, '');
  v = Math.min(8, Math.max(1, v));
  me = v + '号';

  await supabase.from('players').upsert({ player_id: me, status: 'online', last_seen: new Date() });

  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myId').innerText = '我是：' + me;

  start();
}

// 启动循环
function start() {
  setInterval(loadMsg, 700);
  setInterval(checkPrivateRequest, 700);
  setInterval(updateStatus, 1000);

  document.getElementById('messages').addEventListener('click', e => {
    const ava = e.target.closest('.avatar');
    if (!ava) return;
    const id = ava.dataset.id;
    if (id === me) return;
    askPrivate(id);
  });
}

// 发起私聊
async function askPrivate(to) {
  const { data: u } = await supabase.from('players').select('status').eq('player_id', to).single();
  if (u?.status === 'in_private') return alert(to + ' 正在私聊');

  await supabase.from('private_requests').insert([{ from_id: me, to_id: to, status: 'pending' }]);
  alert('已向 ' + to + ' 发起私聊申请');
}

// 检查私聊请求
async function checkPrivateRequest() {
  const { data: r } = await supabase
    .from('private_requests')
    .select('*')
    .eq('to_id', me)
    .eq('status', 'pending')
    .order('created_at', { ascending: false })
    .limit(1);

  if (!r || r.length === 0) return;
  const req = r[0];

  document.getElementById('modalText').innerText = req.from_id + ' 想和你私聊';
  document.getElementById('privateModal').style.display = 'flex';
  window.curReq = req;
}

// 同意私聊
async function acceptPrivate() {
  if (!curReq) return;
  const from = curReq.from_id;

  await supabase.from('private_requests').update({ status: 'ok' }).eq('id', curReq.id);
  await supabase.from('players').update({ status: 'in_private' }).eq('player_id', me);
  await supabase.from('players').update({ status: 'in_private' }).eq('player_id', from);

  mode = "private";
  privateTo = from;
  document.getElementById('endPrivateBtn').style.display = 'block';
  document.getElementById('privateModal').style.display = 'none';
}

// 拒绝私聊
async function rejectPrivate() {
  if (!curReq) return;
  await supabase.from('private_requests').update({ status: 'no' }).eq('id', curReq.id);
  document.getElementById('privateModal').style.display = 'none';
}

// 结束私聊
async function endPrivate() {
  await supabase.from('players').update({ status: 'online' }).eq('player_id', me);
  await supabase.from('players').update({ status: 'online' }).eq('player_id', privateTo);
  mode = "group";
  privateTo = null;
  document.getElementById('endPrivateBtn').style.display = 'none';
}

// 加载消息
async function loadMsg() {
  const { data: list } = await supabase
    .from('messages')
    .select('*')
    .order('created_at', { ascending: true });

  const dom = document.getElementById('messages');
  let html = '';

  for (const m of list) {
    if (mode === 'group' && m.type === 'private') continue;
    if (mode === 'private' && m.type === 'public') continue;
    if (mode === 'private' && ![me, privateTo].includes(m.from_id)) continue;

    if (m.type === 'system') {
      html += `<div class="sys">${m.content}</div>`;
      continue;
    }

    const num = m.from_id.replace('号', '');
    const my = m.from_id === me;

    html += `
    <div class="msg ${my ? 'me' : ''}">
      <div class="avatar" data-id="${m.from_id}">${num}</div>
      <div class="bubble">${m.content}</div>
    </div>`;
  }

  dom.innerHTML = html;
  dom.scrollTop = dom.scrollHeight;
}

// 发送
async function send() {
  const i = document.getElementById('msgInput');
  const c = i.value.trim();
  if (!c) return;

  await supabase.from('messages').insert([{
    from_id: me,
    content: c,
    type: mode === 'group' ? 'public' : 'private',
    to_id: mode === 'group' ? 'all' : privateTo
  }]);

  i.value = '';
}

// 状态
async function updateStatus() {
  const { data: list } = await supabase.from('players').select('*').eq('status', 'in_private');
  const s = document.getElementById('privateStatus');

  if (list && list.length >= 2) {
    s.innerText = list.map(p => p.player_id).join(' ↔ ') + ' 私聊中';
  } else {
    s.innerText = mode === 'group' ? '群聊中' : '私聊：' + privateTo;
  }
}
</script>
</body>
</html>
