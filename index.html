<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稳定私聊</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
  body { background: #121212; color: #fff; max-width: 500px; margin: 0 auto; }
  #login { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #1e1e1e; padding: 30px; border-radius: 16px; width: 100%; text-align: center; }
  #uid { width: 100%; padding: 12px; border-radius: 8px; border: none; margin: 10px 0; background: #2a2a2a; color: #fff; text-align: center; }
  button { padding: 12px; border-radius: 8px; border: none; background: #02c874; color: #fff; font-weight: bold; cursor: pointer; }
  #app { display: none; height: 100vh; flex-direction: column; }
  #top { background: #1e1e1e; padding: 14px; display: flex; justify-content: space-between; align-items: center; }
  #chat { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .msg { display: flex; gap: 8px; max-width: 75%; }
  .me { align-self: flex-end; flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; background: #333; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; flex-shrink: 0; }
  .bubble { background: #2a2a2a; padding: 8px 12px; border-radius: 8px; }
  .me .bubble { background: #02c874; }
  .tip { align-self: center; background: #333; padding: 4px 10px; border-radius: 12px; font-size: 12px; color: #aaa; }
  #input { display: flex; padding: 10px; gap: 8px; background: #1e1e1e; }
  #text { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #2a2a2a; color: #fff; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
  .modal .box { background: #1e1e1e; padding: 24px; border-radius: 12px; text-align: center; }
  .btn-group { display: flex; gap: 10px; margin-top: 16px; justify-content: center; }
  .btn-ok { background: #02c874; }
  .btn-no { background: #666; }
  #endPrivate { background: #ff4444; padding: 6px 10px; border-radius: 6px; display: none; }
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <h2>进入房间</h2>
    <input id="uid" placeholder="输入1-8" maxlength="1">
    <button onclick="login()">进入</button>
  </div>
</div>

<div id="app">
  <div id="top">
    <span id="whoami"></span>
    <span id="privateTip"></span>
    <button id="endPrivate" onclick="endPrivate()">结束私聊</button>
  </div>
  <div id="chat"></div>
  <div id="input">
    <input id="text" placeholder="输入消息..." onkeypress="if(event.key==='Enter')send()">
    <button onclick="send()">发送</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="box">
    <h3 id="modalText"></h3>
    <div class="btn-group">
      <button class="btn-ok" onclick="acceptPrivate()">同意</button>
      <button class="btn-no" onclick="rejectPrivate()">拒绝</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = supabaseClient = supabase.createClient(
  "https://mronesaayjtjuhwvzouj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY"
);

let me = null;
let mode = "group"; // group / private
let privateWith = null;
let lastId = 0;

// 登录
function login() {
  let v = document.getElementById('uid').value.trim();
  if (!v || isNaN(v)) v = '1';
  v = Math.max(1, Math.min(8, +v));
  me = v + '号';
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('whoami').innerText = '我是：' + me;
}

// 点击头像发起私聊
window.startPrivate = async function(target) {
  if (mode === 'private') return;
  privateWith = target;
  mode = 'private';
  lastId = 0;
  document.getElementById('chat').innerHTML = '';
  document.getElementById('privateTip').innerText = `等待 ${target} 同意`;
  document.getElementById('endPrivate').style.display = 'inline-block';

  await supabase.from('private_requests').delete().or(`from_id.eq.${me},to_id.eq.${me}`);
  await supabase.from('private_requests').insert([
    { from_id: me, to_id: target, status: 'pending' }
  ]);
};

// 检查私聊请求
setInterval(async () => {
  if (!me || mode === 'private') return;
  const { data } = await supabase
    .from('private_requests')
    .select('*')
    .eq('to_id', me)
    .eq('status', 'pending')
    .limit(1);
  if (data?.length) {
    window.curReq = data[0];
    document.getElementById('modalText').innerText = `${curReq.from_id} 想和你私聊`;
    document.getElementById('modal').style.display = 'flex';
  }
}, 1000);

// 同意私聊
async function acceptPrivate() {
  if (!curReq) return;
  document.getElementById('modal').style.display = 'none';

  // 标记同意
  await supabase.from('private_requests')
    .update({ status: 'accepted' })
    .eq('id', curReq.id);

  // 发送系统消息：对方已加入（双方都能看到）
  await supabase.from('messages').insert([{
    from_id: 'sys',
    content: `${curReq.from_id} 已加入私聊`,
    type: 'system',
    to_id: 'all'
  }]);

  // 进入私聊
  mode = 'private';
  privateWith = curReq.from_id;
  lastId = 0;
  document.getElementById('chat').innerHTML = '';
  document.getElementById('privateTip').innerText = `私聊中：${privateWith}`;
  document.getElementById('endPrivate').style.display = 'inline-block';
}

// 拒绝
function rejectPrivate() {
  document.getElementById('modal').style.display = 'none';
}

// 结束私聊
function endPrivate() {
  mode = 'group';
  privateWith = null;
  lastId = 0;
  document.getElementById('privateTip').innerText = '';
  document.getElementById('endPrivate').style.display = 'none';
}

// 加载消息
setInterval(loadMessages, 500);
async function loadMessages() {
  if (!me) return;

  let q = supabase
    .from('messages')
    .select('*')
    .gt('id', lastId)
    .order('id', { ascending: true });

  if (mode === 'group') {
    q = q.eq('type', 'public');
  } else {
    // 私聊只看：我发的 / 发给我的
    q = q.or(`(from_id.eq.${me},to_id.eq.${me})`);
  }

  const { data: list } = await q;
  if (!list) return;

  const chat = document.getElementById('chat');
  list.forEach(m => {
    if (m.id <= lastId) return;
    lastId = m.id;

    if (m.type === 'system') {
      chat.insertAdjacentHTML('beforeend', `<div class="tip">${m.content}</div>`);
      return;
    }

    const num = m.from_id.replace('号','');
    const isMe = m.from_id === me;
    chat.insertAdjacentHTML('beforeend', `
      <div class="msg ${isMe?'me':''}">
        <div class="avatar" data-id="${m.from_id}" onclick="startPrivate('${m.from_id}')">${num}</div>
        <div class="bubble">${m.content}</div>
      </div>
    `);
  });
  chat.scrollTop = chat.scrollHeight;

  // 发起方监听：对方同意后立刻刷新状态
  if (mode === 'private' && privateWith) {
    const { data } = await supabase
      .from('private_requests')
      .select('*')
      .eq('from_id', me)
      .eq('to_id', privateWith)
      .eq('status', 'accepted')
      .maybeSingle();
    if (data) {
      document.getElementById('privateTip').innerText = `私聊中：${privateWith}`;
    }
  }
}

// 发送消息
async function send() {
  const txt = document.getElementById('text').value.trim();
  if (!txt || !me) return;
  await supabase.from('messages').insert([{
    from_id: me,
    content: txt,
    type: mode === 'group' ? 'public' : 'private',
    to_id: mode === 'group' ? 'all' : privateWith
  }]);
  document.getElementById('text').value = '';
}
</script>
</body>
</html>
