<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天室</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  body {
    background: #111318;
    color: #eee;
    max-width: 500px;
    margin: 0 auto;
  }

  /* 登录界面 */
  #login {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    background: #111318;
  }

  .login-card {
    width: 100%;
    background: #252a33;
    padding: 40px 30px;
    border-radius: 20px;
    text-align: center;
  }

  .login-card h1 {
    font-size: 26px;
    margin-bottom: 10px;
    color: #fff;
  }

  .login-card p {
    color: #888;
    margin-bottom: 30px;
    font-size: 14px;
  }

  #playerId {
    width: 100%;
    padding: 14px;
    background: #2d323d;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    text-align: center;
    outline: none;
    margin-bottom: 20px;
  }

  #loginBtn {
    width: 100%;
    padding: 14px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }

  #loginError {
    color: #ff4444;
    font-size: 13px;
    margin-top: 12px;
  }

  /* 主界面 */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
    background: #1a1d24;
  }

  #header {
    padding: 16px;
    background: #252a33;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #333;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #statusText {
    font-size: 13px;
    color: #aaa;
  }

  #resetBtn, #endPrivateBtn {
    padding: 6px 10px;
    background: #ef4444;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }

  #endPrivateBtn {
    display: none;
  }

  /* 消息区域 */
  #messages {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: #1a1d24;
  }

  /* 系统提示 */
  .msg-system {
    align-self: center;
    background: #333;
    color: #aaa;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
  }

  /* 别人消息 */
  .msg-other {
    align-self: flex-start;
    display: flex;
    gap: 8px;
    max-width: 70%;
  }

  /* 头像：修复点击 */
  .avatar {
    width: 36px;
    height: 36px;
    background: #555;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: bold;
    flex-shrink: 0;
    cursor: pointer;
    /* 确保可点击 */
    pointer-events: auto !important;
    position: relative;
    z-index: 10;
  }

  .msg-other .bubble {
    background: #2d323d;
    color: #eee;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 15px;
  }

  /* 自己消息 */
  .msg-me {
    align-self: flex-end;
    display: flex;
    flex-direction: row-reverse;
    gap: 8px;
    max-width: 70%;
  }

  .msg-me .bubble {
    background: #07c160;
    color: #fff;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 15px;
  }

  /* 输入框 */
  #input-area {
    display: flex;
    padding: 10px;
    background: #252a33;
    gap: 8px;
    border-top: 1px solid #333;
  }

  #msgInput {
    flex: 1;
    padding: 10px 14px;
    background: #1a1d24;
    color: #fff;
    border: none;
    border-radius: 20px;
    outline: none;
  }

  #sendBtn {
    padding: 10px 18px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
  }

  /* 弹窗 */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  .modal-box {
    background: #252a33;
    padding: 30px;
    border-radius: 14px;
    width: 90%;
    max-width: 350px;
    text-align: center;
  }

  .modal-btn-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }

  .modal-btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .btn-confirm {
    background: #07c160;
    color: #fff;
  }

  .btn-cancel {
    background: #555;
    color: #fff;
  }
</style>
</head>

<body>

<!-- 登录 -->
<div id="login">
  <div class="login-card">
    <h1>🔞20岁的少年心事🔞</h1>
    <p>输入房间编号（1‑8）即可进入</p>
    <input id="playerId" placeholder="请输入编号" maxlength="1">
    <button id="loginBtn" onclick="enterRoom()">进入房间</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="app">
  <div id="header">
    <div class="header-left">
      <span id="myId"></span>
      <span id="statusText">群聊模式</span>
    </div>
    <div style="display:flex; gap:8px">
      <button id="resetBtn" onclick="showResetModal()">重置房间</button>
      <button id="endPrivateBtn" onclick="endPrivateChat()">结束私聊</button>
    </div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="msgInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<!-- 私聊申请弹窗 -->
<div id="privateRequestModal" class="modal">
  <div class="modal-box">
    <h3 id="privateRequestText"></h3>
    <div class="modal-btn-group">
      <button class="modal-btn btn-confirm" onclick="acceptPrivateRequest()">同意</button>
      <button class="modal-btn btn-cancel" onclick="rejectPrivateRequest()">拒绝</button>
    </div>
  </div>
</div>

<!-- 重置弹窗 -->
<div id="resetModal" class="modal">
  <div class="modal-box">
    <h3>重置房间</h3>
    <input id="resetPwd" type="password" placeholder="输入重置密码" style="width:100%;padding:12px;border-radius:8px;border:none;background:#1a1d24;color:#fff;text-align:center;margin-bottom:20px">
    <div class="modal-btn-group">
      <button class="modal-btn btn-cancel" onclick="closeResetModal()">取消</button>
      <button class="modal-btn btn-confirm" onclick="confirmReset()">确认重置</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mronesaayjtjuhwvzouj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY";
const ADMIN_PWD = "admin123";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: false } });
let myId = null;
let myNum = null;
let currentMode = "group"; // group / private
let privatePartner = null;
let pendingPrivateRequestFrom = null;

// 进入房间
async function enterRoom() {
  const input = document.getElementById('playerId').value.trim();
  const err = document.getElementById('loginError');
  err.innerText = '';

  let num = input.replace(/\D/g, '') || '1';
  num = Math.max(1, Math.min(8, num));
  const id = num + '号';
  myNum = num;

  const timeLimit = new Date(Date.now() - 30000).toISOString();
  const { data: exist } = await supabaseClient
    .from('players').select('*').eq('player_id', id).gt('last_seen', timeLimit).maybeSingle();

  if (exist) { err.innerText = '编号已被占用'; return; }

  myId = id;
  await supabaseClient.from('players').upsert({
    player_id: id,
    last_seen: new Date().toISOString(),
    status: "online"
  });

  // 心跳保活
  setInterval(() => {
    supabaseClient.from('players').upsert({
      player_id: id,
      last_seen: new Date().toISOString(),
      status: "online"
    });
  }, 10000);

  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myId').innerText = '我是：' + myId;

  await supabaseClient.from('messages').insert({
    type: 'system',
    from_id: 'system',
    to_id: 'all',
    content: myId + ' 进入了房间'
  });

  // 统一用事件委托（修复头像点击）
  document.getElementById('messages').addEventListener('click', (e) => {
    const avatarEl = e.target.closest('.avatar');
    if (!avatarEl) return;
    const fromId = avatarEl.dataset.fromId;
    if (!fromId || fromId === myId) return;
    sendPrivateRequest(fromId);
  });

  setInterval(loadMessages, 600);
  setInterval(checkPrivateRequests, 1000);
  setInterval(updateOnlineStatus, 2000);
}

// 更新在线状态
async function updateOnlineStatus() {
  const { data: players } = await supabaseClient
    .from('players').select('*').eq('status', 'in_private');

  const statusEl = document.getElementById('statusText');
  if (players && players.length > 0) {
    const pair = players.map(p => p.player_id).join(' & ');
    statusEl.innerText = `私聊中：${pair}`;
  } else {
    statusEl.innerText = currentMode === "group" ? "群聊模式" : `私聊：${privatePartner}`;
  }
}

// 检查私聊申请
async function checkPrivateRequests() {
  const { data: requests } = await supabaseClient
    .from('private_requests').select('*').eq('to_id', myId).eq('status', 'pending');

  if (requests && requests.length > 0) {
    pendingPrivateRequestFrom = requests[0].from_id;
    document.getElementById('privateRequestText').innerText = `${pendingPrivateRequestFrom} 想和你私聊，是否同意？`;
    document.getElementById('privateRequestModal').style.display = 'flex';
  }
}

// 发起私聊申请
async function sendPrivateRequest(toId) {
  if (toId === myId) return;

  const { data: target } = await supabaseClient
    .from('players').select('*').eq('player_id', toId).single();

  if (target?.status === "in_private") {
    alert(`${toId} 正在私聊中`);
    return;
  }

  await supabaseClient.from('private_requests').insert({
    from_id: myId,
    to_id: toId,
    status: 'pending'
  });

  alert(`已向 ${toId} 发起私聊申请`);
}

// 同意私聊
async function acceptPrivateRequest() {
  if (!pendingPrivateRequestFrom) return;

  await supabaseClient.from('players').update({ status: "in_private" }).eq('player_id', myId);
  await supabaseClient.from('players').update({ status: "in_private" }).eq('player_id', pendingPrivateRequestFrom);

  await supabaseClient.from('private_requests').update({ status: 'accepted' })
    .eq('from_id', pendingPrivateRequestFrom).eq('to_id', myId);

  currentMode = "private";
  privatePartner = pendingPrivateRequestFrom;
  document.getElementById('endPrivateBtn').style.display = 'block';

  await supabaseClient.from('messages').insert({
    type: 'system',
    from_id: 'system',
    to_id: 'all',
    content: `${myId} ↔ ${privatePartner} 开始私聊`
  });

  document.getElementById('privateRequestModal').style.display = 'none';
  pendingPrivateRequestFrom = null;
}

// 拒绝私聊
async function rejectPrivateRequest() {
  if (!pendingPrivateRequestFrom) return;

  await supabaseClient.from('private_requests').update({ status: 'rejected' })
    .eq('from_id', pendingPrivateRequestFrom).eq('to_id', myId);

  document.getElementById('privateRequestModal').style.display = 'none';
  pendingPrivateRequestFrom = null;
}

// 结束私聊
async function endPrivateChat() {
  if (currentMode !== "private" || !privatePartner) return;

  await supabaseClient.from('players').update({ status: "online" }).eq('player_id', myId);
  await supabaseClient.from('players').update({ status: "online" }).eq('player_id', privatePartner);

  await supabaseClient.from('messages').insert({
    type: 'system',
    from_id: 'system',
    to_id: 'all',
    content: `${myId} ↔ ${privatePartner} 结束私聊`
  });

  currentMode = "group";
  privatePartner = null;
  document.getElementById('endPrivateBtn').style.display = 'none';
}

// 加载消息（修复头像 data-from-id）
async function loadMessages() {
  const { data: msgList } = await supabaseClient
    .from('messages').select('*').order('created_at', { ascending: true });

  const dom = document.getElementById('messages');
  let html = '';

  msgList.forEach(m => {
    if (currentMode === "group" && m.type === "private") return;
    if (currentMode === "private" && m.type === "public") return;
    if (currentMode === "private" && m.type === "private" &&
        m.from_id !== myId && m.from_id !== privatePartner) return;

    if (m.type === 'system') {
      html += `<div class="msg-system">${m.content}</div>`;
      return;
    }

    const numText = m.from_id.replace('号', '');

    if (m.from_id === myId) {
      html += `
      <div class="msg-me">
        <div class="avatar" data-from-id="${m.from_id}">${numText}</div>
        <div class="bubble">${m.content}</div>
      </div>`;
    } else {
      html += `
      <div class="msg-other">
        <div class="avatar" data-from-id="${m.from_id}">${numText}</div>
        <div class="bubble">${m.content}</div>
      </div>`;
    }
  });

  dom.innerHTML = html;
  dom.scrollTop = dom.scrollHeight;
}

// 发送消息
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !myId) return;

  const msgType = currentMode === "group" ? "public" : "private";
  const toId = currentMode === "group" ? "all" : privatePartner;

  await supabaseClient.from('messages').insert({
    type: msgType,
    from_id: myId,
    to_id: toId,
    content: content
  });

  input.value = '';
  loadMessages();
}

// 重置房间
function showResetModal() {
  document.getElementById('resetModal').style.display = 'flex';
}
function closeResetModal() {
  document.getElementById('resetModal').style.display = 'none';
  document.getElementById('resetPwd').value = '';
}

async function confirmReset() {
  const pwd = document.getElementById('resetPwd').value.trim();
  if (pwd !== ADMIN_PWD) {
    alert('密码错误');
    return;
  }
  if (!confirm('确定重置房间？')) return;

  await supabaseClient.from('messages').delete().neq('id', 0);
  await supabaseClient.from('players').delete().neq('id', 0);
  await supabaseClient.from('private_requests').delete().neq('id', 0);

  alert('房间已重置');
  closeResetModal();
  location.reload();
}
</script>
</body>
</html>
