<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>匿名聊天室</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  body {
    background: #1a1d24;
    color: #eee;
    max-width: 500px;
    margin: 0 auto;
  }

  /* ========== 登录界面 ========== */
  #login {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    background: linear-gradient(160deg, #1a1d24, #111318);
  }

  .login-card {
    width: 100%;
    background: #252a33;
    padding: 40px 30px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    text-align: center;
  }

  .login-card h1 {
    font-size: 26px;
    margin-bottom: 10px;
    color: #fff;
  }

  .login-card p {
    color: #888;
    margin-bottom: 30px;
    font-size: 14px;
  }

  #playerId {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #2d323d;
    color: white;
    font-size: 16px;
    text-align: center;
    outline: none;
    margin-bottom: 20px;
  }

  #loginBtn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: #07c160;
    color: white;
    border: none;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  #loginBtn:active {
    transform: scale(0.97);
    opacity: 0.9;
  }

  #loginError {
    color: #ff4444;
    font-size: 13px;
    margin-top: 12px;
  }

  /* ========== 主界面 ========== */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
    background: #1a1d24;
  }

  #header {
    padding: 16px;
    background: #252a33;
    text-align: center;
    font-weight: bold;
    border-bottom: 1px solid #333;
  }

  /* 消息区域 */
  #messages {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: #1a1d24;
  }

  /* 系统提示 */
  .msg-system {
    align-self: center;
    background: #333;
    color: #aaa;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
  }

  /* 别人的消息：左头像 + 左气泡 */
  .msg-other {
    align-self: flex-start;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    max-width: 70%;
  }

  .avatar {
    width: 36px;
    height: 36px;
    background: #555;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: bold;
    font-size: 14px;
    flex-shrink: 0;
  }

  .msg-other .bubble {
    background: #2d323d;
    color: #eee;
    padding: 10px 14px;
    border-radius: 8px;
    position: relative;
    word-break: break-all;
    font-size: 15px;
    line-height: 1.4;
  }

  /* 自己的消息：右气泡 + 右头像 */
  .msg-me {
    align-self: flex-end;
    display: flex;
    flex-direction: row-reverse;
    gap: 8px;
    max-width: 70%;
  }

  .msg-me .bubble {
    background: #07c160;
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    word-break: break-all;
    font-size: 15px;
    line-height: 1.4;
  }

  /* 输入框 */
  #input-area {
    display: flex;
    padding: 12px;
    background: #252a33;
    gap: 8px;
    border-top: 1px solid #333;
  }

  #msgInput {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #333;
    background: #1a1d24;
    color: #fff;
    border-radius: 20px;
    outline: none;
    font-size: 15px;
  }

  #sendBtn {
    padding: 10px 20px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
  }
</style>
</head>

<body>

<!-- 登录 -->
<div id="login">
  <div class="login-card">
    <h1>🎭 匿名聊天室</h1>
    <p>输入房间编号（1‑8）即可进入</p>
    <input id="playerId" placeholder="请输入编号" maxlength="1">
    <button id="loginBtn" onclick="enterRoom()">进入房间</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="app">
  <div id="header">
    <span id="myId"></span>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="msgInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
// 配置区
const SUPABASE_URL = 'https://mronesaayjtjuhwvzouj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: false }
});
let myId = null;

// 进入房间
async function enterRoom() {
  const input = document.getElementById('playerId').value.trim();
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';

  let num = input.replace(/[^\d]/g, '') || '1';
  num = Math.max(1, Math.min(8, parseInt(num) || 1));
  const id = num + '号';

  const thirtySecondsAgo = new Date(Date.now() - 30000).toISOString();
  const { data: existing } = await supabaseClient
    .from('players')
    .select('*')
    .eq('player_id', id)
    .gt('last_seen', thirtySecondsAgo)
    .maybeSingle();

  if (existing) {
    errorEl.textContent = '该编号已被使用，请换其他编号';
    return;
  }

  myId = id;

  await supabaseClient.from('players').upsert({
    player_id: id,
    last_seen: new Date().toISOString()
  });

  setInterval(() => {
    supabaseClient.from('players').upsert({
      player_id: id,
      last_seen: new Date().toISOString()
    });
  }, 10000);

  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myId').textContent = '我是：' + myId;

  await supabaseClient.from('messages').insert({
    type: 'system',
    from_id: 'system',
    to_id: 'all',
    content: myId + ' 进入了房间'
  });

  // 启动自动刷新
  setInterval(loadMessages, 500);
}

// 加载消息（区分自己/别人）
async function loadMessages() {
  const { data: messages } = await supabaseClient
    .from('messages')
    .select('*')
    .order('created_at', { ascending: true })
    .limit(100);

  const container = document.getElementById('messages');
  let html = '';

  messages.forEach(msg => {
    if (msg.type === 'system') {
      html += `<div class="msg-system">${msg.content}</div>`;
      return;
    }

    const numText = msg.from_id.replace('号', '');

    if (msg.from_id === myId) {
      html += `
        <div class="msg-me">
          <div class="avatar">${numText}</div>
          <div class="bubble">${msg.content}</div>
        </div>
      `;
    } else {
      html += `
        <div class="msg-other">
          <div class="avatar">${numText}</div>
          <div class="bubble">${msg.content}</div>
        </div>
      `;
    }
  });

  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

// 发送消息
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !myId) return;

  await supabaseClient.from('messages').insert({
    type: 'public',
    from_id: myId,
    to_id: 'all',
    content: content
  });

  input.value = '';
  loadMessages();
}
</script>
</body>
</html>
