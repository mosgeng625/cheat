<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名聊天室 - Supabase版</title>
    <!-- 解决 favicon 404 -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3204/3204123.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e; 
            color: #eee; 
            height: 100vh; 
            overflow: hidden;
        }
        
        #login { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            gap: 20px;
        }
        #login h1 { color: #e94560; margin-bottom: 20px; }
        #login input {
            padding: 12px 20px;
            border: 2px solid #e94560;
            background: #16213e;
            color: #fff;
            border-radius: 8px;
            font-size: 16px;
            width: 200px;
            text-align: center;
        }
        #login button {
            padding: 12px 40px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        #login button:hover { background: #ff6b6b; }
        .error { color: #ff6b6b; font-size: 14px; }
        
        #app { display: none; height: 100vh; }
        
        #header {
            background: #16213e;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e94560;
        }
        #header h2 { color: #e94560; }
        
        .admin-btn {
            background: #0f3460;
            color: #fff;
            border: 1px solid #e94560;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .admin-btn:hover { background: #e94560; }
        
        #main {
            display: flex;
            height: calc(100vh - 60px);
        }
        
        #sidebar {
            width: 200px;
            background: #16213e;
            padding: 15px;
            overflow-y: auto;
        }
        .player-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: #0f3460;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .player-item:hover { background: #e94560; }
        .player-avatar {
            width: 36px; 
            height: 36px;
            background: #533483;
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .player-name { font-size: 14px; }
        .online { color: #4ecca3; font-size: 12px; }
        
        #chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .msg {
            margin-bottom: 15px;
            padding: 10px 15px;
            background: #16213e;
            border-radius: 10px;
            max-width: 80%;
        }
        .msg-header {
            color: #e94560;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .msg-content { font-size: 15px; line-height: 1.5; }
        .msg-private {
            border-left: 3px solid #e94560;
            background: #2d132c;
        }
        
        #input-area {
            padding: 15px;
            background: #16213e;
            display: flex;
            gap: 10px;
        }
        #msgInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #533483;
            background: #0f3460;
            color: #fff;
            border-radius: 8px;
            font-size: 15px;
        }
        #sendBtn {
            padding: 12px 30px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        #privateModal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #16213e;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .close-btn {
            background: none;
            border: none;
            color: #e94560;
            font-size: 24px;
            cursor: pointer;
        }
        #privateMessages {
            flex: 1;
            overflow-y: auto;
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            min-height: 200px;
        }
        #privateInputArea { display: flex; gap: 10px; }
        #privateInput { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #533483; background: #1a1a2e; color: #fff; }
        #sendPrivate { padding: 10px 20px; background: #e94560; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login">
        <h1>🎭 匿名聊天室</h1>
        <p>请输入你的编号（1-8）</p>
        <input type="text" id="playerId" placeholder="例如：3号" maxlength="3">
        <button onclick="enterRoom()">进入房间</button>
        <p class="error" id="loginError"></p>
        <p style="margin-top: 30px; color: #888; font-size: 12px;">
            房主密码：admin123（仅用于重置房间）
        </p>
    </div>

    <div id="app">
        <div id="header">
            <h2>🎭 匿名聊天室</h2>
            <div>
                <span id="myId" style="margin-right: 20px;"></span>
                <button class="admin-btn" onclick="showAdmin()">房主控制</button>
            </div>
        </div>
        
        <div id="main">
            <div id="sidebar">
                <h3 style="margin-bottom: 15px; color: #e94560;">在线玩家</h3>
                <div id="playerList"></div>
            </div>
            
            <div id="chat-area">
                <div id="messages"></div>
                <div id="input-area">
                    <input type="text" id="msgInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <div id="privateModal" onclick="if(event.target===this)closePrivate()">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="privateTitle">与 X号 私聊</h3>
                <button class="close-btn" onclick="closePrivate()">×</button>
            </div>
            <div id="privateMessages"></div>
            <div id="privateInputArea">
                <input type="text" id="privateInput" placeholder="输入私聊内容..." onkeypress="if(event.key==='Enter')sendPrivate()">
                <button id="sendPrivate" onclick="sendPrivate()">发送</button>
            </div>
        </div>
    </div>

    <div id="adminModal" onclick="if(event.target===this)closeAdmin()" style="display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.8); z-index:200; justify-content:center; align-items:center;">
        <div style="background:#16213e; padding:30px; border-radius:12px; text-align:center;">
            <h3 style="color:#e94560; margin-bottom:20px;">房主控制面板</h3>
            <p style="margin-bottom:20px; color:#888;">此操作将清空所有聊天记录<br>所有人需要重新进入并输入编号</p>
            <button onclick="resetRoom()" style="padding:12px 40px; background:#e94560; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:16px;">⚠️ 重置房间</button>
            <button onclick="closeAdmin()" style="margin-left:10px; padding:12px 30px; background:#533483; color:#fff; border:none; border-radius:8px; cursor:pointer;">取消</button>
        </div>
    </div>

    <!-- 改用 unpkg CDN，避免被浏览器拦截 -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="app.js?v=2"></script>
</body>
</html>
