<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稳定聊天</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
  }
  body {
    background: #111;
    color: #fff;
    max-width: 500px;
    margin: 0 auto;
  }
  #login {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #222;
    padding: 30px;
    border-radius: 16px;
    width: 100%;
    text-align: center;
  }
  #playerId {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: #333;
    color: #fff;
    text-align: center;
  }
  button {
    padding: 10px 16px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  #header {
    padding: 14px;
    background: #222;
    display: flex;
    justify-content: space-between;
  }
  #messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    display: flex;
    gap: 8px;
    max-width: 75%;
  }
  .msg.me {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .avatar {
    width: 32px;
    height: 32px;
    background: #555;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
  }
  .bubble {
    background: #333;
    padding: 8px 12px;
    border-radius: 8px;
  }
  .msg.me .bubble {
    background: #07c160;
  }
  #inputArea {
    display: flex;
    padding: 10px;
    background: #222;
    gap: 8px;
  }
  #msgInput {
    flex: 1;
    padding: 10px 14px;
    border-radius: 20px;
    border: none;
    background: #1a1a1a;
    color: #fff;
  }
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
  }
  .modalBox {
    background: #222;
    padding: 24px;
    border-radius: 12px;
    text-align: center;
  }
  .btnGroup {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: center;
  }
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <h3>输入编号（1‑8）</h3>
    <input id="playerId" maxlength="1" placeholder="编号">
    <button onclick="login()">进入</button>
  </div>
</div>

<div id="app">
  <div id="header">
    <div id="myInfo"></div>
    <div>
      <button id="endBtn" style="background:#c93636;display:none;" onclick="endPrivate()">结束私聊</button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="msgInput" placeholder="输入消息">
    <button onclick="send()">发送</button>
  </div>
</div>

<div class="modal" id="inviteModal">
  <div class="modalBox">
    <div id="modalText"></div>
    <div class="btnGroup">
      <button onclick="acceptPrivate()">同意</button>
      <button onclick="rejectPrivate()">拒绝</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const supabase = supabase.createClient(
  "https://mronesaayjtjuhwvzouj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY"
);

let me = null;
let privateWith = null;
let lastId = 0;

// 登录
async function login() {
  let v = document.getElementById('playerId').value.trim() || '1';
  v = v.replace(/\D/g,'');
  v = Math.min(8, Math.max(1, v));
  me = v + '号';

  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myInfo').innerText = '我：' + me;

  // 只加载新消息，永不重复
  setInterval(loadNewMsg, 300);
  // 监听私聊邀请
  setInterval(watchInvite, 500);
  // 监听对方是否退出私聊
  setInterval(watchPartnerQuit, 500);
}

// 只加载新消息（核心修复）
async function loadNewMsg() {
  const { data } = await supabase
    .from('messages')
    .select('*')
    .gt('id', lastId)
    .order('id', { ascending: true });

  if (!data || data.length === 0) return;

  const box = document.getElementById('messages');
  data.forEach(m => {
    const isPrivateChat = m.type === 'private';
    const isToMe = m.to_id === me;
    const isFromMe = m.from_id === me;
    const isToPartner = m.to_id === privateWith;

    // 群聊只看 public
    if (!privateWith && m.type !== 'public') return;

    // 私聊只看双方
    if (privateWith) {
      const ok = (isFromMe && isToPartner) || (isToMe && m.from_id === privateWith);
      if (!ok) return;
    }

    const isMe = m.from_id === me;
    const num = m.from_id.replace('号','');
    const html = `
      <div class="msg ${isMe ? 'me' : ''}">
        <div class="avatar" data-id="${m.from_id}">${num}</div>
        <div class="bubble">${m.content}</div>
      </div>
    `;
    box.insertAdjacentHTML('beforeend', html);
    lastId = Math.max(lastId, m.id);
  });

  box.scrollTop = box.scrollHeight;
}

// 发送消息
async function send() {
  const i = document.getElementById('msgInput');
  const c = i.value.trim();
  if (!c) return;
  i.value = '';

  await supabase.from('messages').insert([{
    from_id: me,
    content: c,
    type: privateWith ? 'private' : 'public',
    to_id: privateWith || 'all'
  }]);
}

// 点击头像发起私聊
document.getElementById('messages').onclick = e => {
  const ava = e.target.closest('.avatar');
  if (!ava) return;
  const to = ava.dataset.id;
  if (to === me) return;
  invite(to);
};

// 发起邀请
async function invite(to) {
  await supabase.from('private_invite').insert([{ from_id: me, to_id: to, ok: false }]);
  alert('已发起私聊邀请');
}

// 监听邀请
async function watchInvite() {
  if (privateWith) return;

  const { data } = await supabase
    .from('private_invite')
    .select('*')
    .eq('to_id', me)
    .eq('ok', false)
    .order('id', { ascending: false })
    .limit(1);

  if (!data || data.length === 0) return;
  const req = data[0];

  const m = document.getElementById('inviteModal');
  const t = document.getElementById('modalText');
  t.innerText = req.from_id + ' 想和你私聊';
  m.style.display = 'flex';
  window.curInvite = req;
}

// 同意
async function acceptPrivate() {
  if (!window.curInvite) return;
  const from = window.curInvite.from_id;

  await supabase.from('private_invite').update({ ok: true }).eq('id', window.curInvite.id);

  privateWith = from;
  document.getElementById('endBtn').style.display = 'inline-block';
  document.getElementById('inviteModal').style.display = 'none';
  lastId = 0;
}

// 拒绝
function rejectPrivate() {
  document.getElementById('inviteModal').style.display = 'none';
}

// 监听对方是否同意（自动进私聊）
setInterval(async () => {
  if (privateWith) return;

  const { data } = await supabase
    .from('private_invite')
    .select('*')
    .eq('from_id', me)
    .eq('ok', true)
    .order('id', { ascending: false })
    .limit(1);

  if (data && data.length > 0) {
    privateWith = data[0].to_id;
    document.getElementById('endBtn').style.display = 'inline-block';
    lastId = 0;
  }
}, 500);

// 结束私聊
async function endPrivate() {
  if (!privateWith) return;
  await supabase.from('private_invite').delete().or(
    `from_id.eq.${me},to_id.eq.${me},from_id.eq.${privateWith},to_id.eq.${privateWith}`
  );
  privateWith = null;
  document.getElementById('endBtn').style.display = 'none';
  lastId = 0;
}

// 监听对方退出
async function watchPartnerQuit() {
  if (!privateWith) return;

  const { data } = await supabase
    .from('private_invite')
    .select('*')
    .or(`from_id.eq.${privateWith},to_id.eq.${privateWith}`);

  if (!data || data.length === 0) {
    privateWith = null;
    document.getElementById('endBtn').style.display = 'none';
  }
}
</script>
</body>
</html>
