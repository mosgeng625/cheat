<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名聊天室</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3204/3204123.png">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1a2e;color:#eee;font-family:Arial}
        #login{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
        input,button{padding:10px;margin:5px;border-radius:6px}
        button{background:#e94560;color:white;border:none}
        #app{display:none;height:100vh}
        #messages{flex:1;padding:20px;overflow-y:auto}
        .msg{background:#16213e;padding:10px;margin:10px 0;border-radius:8px}
    </style>
</head>
<body>

<div id="login">
    <h1>匿名聊天室</h1>
    <input id="playerId" placeholder="输入1-8">
    <button onclick="enterRoom()">进入房间</button>
    <p id="loginError" style="color:red"></p>
</div>

<div id="app">
    <div style="padding:10px;background:#16213e">
        <span id="myId"></span>
        <button onclick="showAdmin()">房主</button>
    </div>
    <div id="messages"></div>
    <div style="display:flex">
        <input id="msgInput" style="flex:1" onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()">发送</button>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
// ==================== 你自己的配置 ====================
const SUPABASE_URL = "https://mronesaayjtjuhwvzouj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY";
const ADMIN_PASSWORD = "admin123";

// 只声明一次
let supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: false }
});

let myId = null;

// 登录
async function enterRoom() {
  let v = document.getElementById('playerId').value.trim();
  let id = (v.replace(/\D/g,'')||1)+"号";

  let {data:exist} = await supabase.from('players')
    .select('*').eq('player_id',id)
    .gt('last_seen',new Date(Date.now()-30000).toISOString())
    .maybeSingle();

  if(exist){
    document.getElementById('loginError').textContent="已被占用";
    return;
  }

  myId = id;
  await supabase.from('players').upsert({player_id:id,last_seen:new Date().toISOString()});

  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('myId').textContent="我是："+myId;

  start();
}

// 监听
function start(){
  supabase.channel('msg').on('postgres_changes',{event:'*',table:'messages'},loadMsg).subscribe();
  loadMsg();
}

// 加载消息
async function loadMsg(){
  let {data} = await supabase.from('messages').select('*').order('created_at',{ascending:true});
  let dom = document.getElementById('messages');
  dom.innerHTML='';
  data.forEach(m=>{
    let d=document.createElement('div');
    d.className='msg';
    d.textContent=m.from_id+": "+m.content;
    dom.appendChild(d);
  });
}

// 发送
async function sendMessage(){
  let t=document.getElementById('msgInput').value.trim();
  if(!t||!myId)return;
  await supabase.from('messages').insert({
    type:'public',from_id:myId,to_id:'all',content:t
  });
  document.getElementById('msgInput').value='';
}

// 房主
function showAdmin(){
  if(prompt("密码")===ADMIN_PASSWORD){
    alert("重置功能已简化，如需完整版我再给你加上");
  }
}
</script>
</body>
</html>
