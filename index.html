<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>匿名聊天室</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  body {
    background: #1a1d24;
    color: #eee;
    max-width: 500px;
    margin: 0 auto;
  }

  /* ========== 登录界面 ========== */
  #login {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    background: #111318;
  }

  /* 顶部标题 */
  .login-title {
    font-size: 26px;
    font-weight: bold;
    color: #fff;
    margin-bottom: 16px;
    text-align: center;
  }

  /* 图片（只占用一部分空间，不铺满） */
  .login-img {
    width: 70%;
    height: auto;
    border-radius: 12px;
    margin-bottom: 20px;
  }

  .login-card {
    width: 100%;
    background: #252a33;
    padding: 30px 24px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    text-align: center;
  }

  .login-card p {
    color: #888;
    margin-bottom: 20px;
    font-size: 14px;
  }

  #playerId {
    width: 100%;
    padding: 14px;
    background: #2d323d;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    text-align: center;
    outline: none;
    margin-bottom: 16px;
  }

  #loginBtn {
    width: 100%;
    padding: 14px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }

  #loginError {
    color: #ff4444;
    font-size: 13px;
    margin-top: 10px;
  }

  /* ========== 主界面 ========== */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
    background: #1a1d24;
  }

  #header {
    padding: 16px;
    background: #252a33;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #333;
  }

  #myId {
    font-weight: bold;
    font-size: 16px;
  }

  #resetBtn {
    padding: 6px 10px;
    background: #ef4444;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }

  /* 消息区域 */
  #messages {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: #1a1d24;
  }

  .msg-system {
    align-self: center;
    background: #333;
    color: #aaa;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
  }

  /* 别人消息 */
  .msg-other {
    align-self: flex-start;
    display: flex;
    gap: 8px;
    max-width: 70%;
  }

  .avatar {
    width: 36px;
    height: 36px;
    background: #555;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: bold;
    flex-shrink: 0;
  }

  .msg-other .bubble {
    background: #2d323d;
    color: #eee;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 15px;
  }

  /* 自己消息 */
  .msg-me {
    align-self: flex-end;
    display: flex;
    flex-direction: row-reverse;
    gap: 8px;
    max-width: 70%;
  }

  .msg-me .bubble {
    background: #07c160;
    color: #fff;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 15px;
  }

  /* 输入框 */
  #input-area {
    display: flex;
    padding: 10px;
    background: #252a33;
    gap: 8px;
    border-top: 1px solid #333;
  }

  #msgInput {
    flex: 1;
    padding: 10px 14px;
    background: #1a1d24;
    color: #fff;
    border: none;
    border-radius: 20px;
    outline: none;
  }

  #sendBtn {
    padding: 10px 18px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
  }

  /* 重置弹窗 */
  #resetModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  .modal-box {
    background: #252a33;
    padding: 30px;
    border-radius: 14px;
    width: 90%;
    max-width: 350px;
    text-align: center;
  }

  .modal-box input {
    width: 100%;
    padding: 12px;
    background: #1a1d24;
    color: #fff;
    border: none;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 20px;
  }
</style>
</head>

<body>

<!-- 登录界面 -->
<div id="login">
  <h1 class="login-title">吴彦祖们的秘密基地</h1>
  <img class="login-img" src="https://p26-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/a8c410f64de84c7d9411102c8a8bc577.png">
  
  <div class="login-card">
    <p>输入房间编号（1‑8）即可进入</p>
    <input id="playerId" placeholder="请输入编号" maxlength="1">
    <button id="loginBtn" onclick="enterRoom()">进入房间</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="app">
  <div id="header">
    <span id="myId"></span>
    <button id="resetBtn" onclick="showResetModal()">重置房间</button>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="msgInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<!-- 重置弹窗 -->
<div id="resetModal">
  <div class="modal-box">
    <h3>重置房间</h3>
    <input id="resetPwd" type="password" placeholder="输入重置密码">
    <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="closeResetModal()" style="padding:10px 16px;background:#555;color:#fff;border:none;border-radius:8px">取消</button>
      <button onclick="doReset()" style="padding:10px 16px;background:#ef4444;color:#fff;border:none;border-radius:8px">确认</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mronesaayjtjuhwvzouj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY";
const ADMIN_PWD = "admin123";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: false } });
let myId = null;

// 进入房间
async function enterRoom() {
  const input = document.getElementById('playerId').value.trim();
  const err = document.getElementById('loginError');
  err.innerText = '';

  let num = input.replace(/\D/g, '') || '1';
  num = Math.max(1, Math.min(8, num));
  const id = num + '号';

  const timeLimit = new Date(Date.now() - 30000).toISOString();
  const { data: exist } = await supabaseClient
    .from('players').select('*').eq('player_id', id).gt('last_seen', timeLimit).maybeSingle();

  if (exist) { err.innerText = '编号已被占用'; return; }

  myId = id;
  await supabaseClient.from('players').upsert({ player_id: id, last_seen: new Date().toISOString() });

  setInterval(() => {
    supabaseClient.from('players').upsert({ player_id: id, last_seen: new Date().toISOString() });
  }, 10000);

  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myId').innerText = '我是：' + myId;

  await supabaseClient.from('messages').insert({
    type: 'system', from_id: 'system', to_id: 'all', content: myId + ' 进入了房间'
  });

  setInterval(loadMessages, 600);
}

// 加载消息
async function loadMessages() {
  const { data: msgList } = await supabaseClient
    .from('messages').select('*').order('created_at', { ascending: true });

  const dom = document.getElementById('messages');
  let html = '';

  msgList.forEach(m => {
    if (m.type === 'system') {
      html += `<div class="msg-system">${m.content}</div>`;
      return;
    }
    const numText = m.from_id.replace('号', '');
    if (m.from_id === myId) {
      html += `<div class="msg-me"><div class="avatar">${numText}</div><div class="bubble">${m.content}</div></div>`;
    } else {
      html += `<div class="msg-other"><div class="avatar">${numText}</div><div class="bubble">${m.content}</div></div>`;
    }
  });

  dom.innerHTML = html;
  dom.scrollTop = dom.scrollHeight;
}

// 发送消息
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !myId) return;

  await supabaseClient.from('messages').insert({
    type: 'public', from_id: myId, to_id: 'all', content: content
  });

  input.value = '';
  loadMessages();
}

// 重置弹窗
function showResetModal() {
  document.getElementById('resetModal').style.display = 'flex';
}
function closeResetModal() {
  document.getElementById('resetModal').style.display = 'none';
}

// 重置房间
async function doReset() {
  const pwd = document.getElementById('resetPwd').value.trim();
  if (pwd !== ADMIN_PWD) { alert('密码错误'); return; }
  if (!confirm('确定重置房间？')) return;

  await supabaseClient.from('messages').delete().neq('id',0);
  await supabaseClient.from('players').delete().neq('id',0);
  alert('重置成功');
  location.reload();
}
</script>
</body>
</html>
