<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>20岁的少年心事</title>
<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
body{margin:0;background:#1a1a1a;color:#eaeaea}
#login{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#111;flex-direction:column;gap:12px}
#login input{padding:10px 14px;width:220px;border-radius:8px;border:none;background:#2a2a2a;color:#fff;text-align:center;font-size:16px}
#login button{padding:10px 24px;border-radius:8px;border:none;background:#3d7eff;color:#fff;font-weight:500;cursor:pointer}
#app{display:none;padding:12px;height:100vh;flex-direction:column}
#header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
#userStatus{font-size:14px;color:#aaa}
#messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.msg{padding:8px 12px;border-radius:14px;max-width:75%;word-break:break-word}
.msg.other{align-self:flex-start;background:#2b2b2b}
.msg.me{align-self:flex-end;background:#3d7eff;color:#fff}
#inputBar{display:flex;gap:8px}
#msgInput{flex:1;padding:10px 14px;border-radius:20px;border:none;background:#242424;color:#fff}
#sendBtn{padding:10px 16px;border-radius:20px;border:none;background:#3d7eff;color:#fff}
.privateBtn{background:#555;color:#fff;border:none;border-radius:12px;padding:6px 10px;margin:2px;cursor:pointer}
#privateModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
.modalBox{background:#222;border-radius:12px;padding:20px;min-width:280px;text-align:center}
.modalBox button{margin:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer}
#acceptBtn{background:#3d7eff;color:#fff}
#rejectBtn{background:#555;color:#fff}
#endPrivateBtn{display:none;background:#ff4d4f;color:#fff;border:none;border-radius:12px;padding:6px 10px}
#privateStatus{font-size:14px;color:#ccc;margin-left:8px}
</style>
</head>
<body>
<div id="login">
  <input id="userIdInput" placeholder="输入1-8进入房间" maxlength="1">
  <button onclick="login()">进入</button>
</div>

<div id="app">
  <div id="header">
    <div id="userStatus"></div>
    <div>
      <button id="endPrivateBtn" onclick="endPrivate()">结束私聊</button>
      <span id="privateStatus"></span>
    </div>
  </div>

  <div id="messages"></div>

  <div id="inputBar">
    <input id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button id="sendBtn" onclick="sendMsg()">发送</button>
  </div>

  <div id="privateModal">
    <div class="modalBox">
      <div id="modalText"></div>
      <button id="acceptBtn" onclick="acceptPrivate()">同意</button>
      <button id="rejectBtn" onclick="rejectPrivate()">拒绝</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ====================
// 你自己的 Supabase 信息
// ====================
const supabaseUrl = "https://your-supabase-url.supabase.co";
const supabaseKey = "your-anon-key";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let me = null;
let mode = "group";
let privatePartner = null;
let lastLoadedId = 0;
let loadedMessageIds = new Set();
let currentPrivateRequest = null;

// ====================
// 登录
// ====================
function login() {
  const v = document.getElementById("userIdInput").value.trim();
  if (!v || isNaN(v) || v < 1 || v > 8) {
    alert("请输入1-8");
    return;
  }
  me = v;
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("userStatus").innerText = `我是：${me}号`;
  loadMessages();
  startLoop();
}

// ====================
// 发送消息
// ====================
async function sendMsg() {
  const i = document.getElementById("msgInput");
  const content = i.value.trim();
  if (!content || !me) return;
  i.value = "";

  const table = mode === "private" ? "private_messages" : "messages";
  const target = mode === "private" ? privatePartner : null;

  await supabaseClient.from(table).insert([
    {
      from_id: me,
      to_id: target,
      content: content,
      created_at: new Date().toISOString()
    }
  ]);
}

// ====================
// 加载消息
// ====================
async function loadMessages() {
  const box = document.getElementById("messages");
  const table = mode === "private" ? "private_messages" : "messages";

  let q = supabaseClient
    .from(table)
    .select("*")
    .gt("id", lastLoadedId)
    .order("id", { ascending: true });

  if (mode === "private") {
    q = q.or(`and(from_id.eq.${me},to_id.eq.${privatePartner}),and(from_id.eq.${privatePartner},to_id.eq.${me})`);
  } else {
    q = q.is("to_id", null);
  }

  const { data } = await q;
  if (!data) return;

  data.forEach(m => {
    if (loadedMessageIds.has(m.id)) return;
    loadedMessageIds.add(m.id);
    lastLoadedId = Math.max(lastLoadedId, m.id);

    const div = document.createElement("div");
    div.className = "msg " + (m.from_id == me ? "me" : "other");
    div.innerText = `${m.from_id}：${m.content}`;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

// ====================
// 循环拉取
// ====================
function startLoop() {
  setInterval(loadMessages, 400);
}

// ==============================
// 1. 发起私聊请求（发起方用）
// ==============================
async function sendPrivateRequest(targetId) {
  if (!me || targetId == me) return;

  await supabaseClient
    .from("private_requests")
    .delete()
    .or(`from_id.eq('${me}'),to_id.eq('${me}')`);

  const { data, error } = await supabaseClient
    .from("private_requests")
    .insert([
      {
        from_id: me,
        to_id: targetId,
        status: "pending"
      }
    ]);

  mode = "private";
  privatePartner = targetId;
  document.getElementById("endPrivateBtn").style.display = "inline-block";
  document.getElementById("privateStatus").innerText = `等待 ${targetId} 同意（5秒）`;

  setTimeout(async () => {
    await endPrivate();
    alert("请求超时，对方未响应");
  }, 5000);
}

// ==============================
// 2. 被申请方：监听请求
// ==============================
setInterval(async () => {
  if (mode === "private" || document.getElementById("privateModal").style.display === "flex" || !me) return;

  const { data: reqs } = await supabaseClient
    .from("private_requests")
    .select("*")
    .eq("to_id", me)
    .eq("status", "pending")
    .order("created_at", { ascending: false })
    .limit(1);

  if (!reqs || reqs.length === 0) return;
  const req = reqs[0];
  currentPrivateRequest = req;

  document.getElementById("modalText").innerText = `${req.from_id} 请求私聊`;
  document.getElementById("privateModal").style.display = "flex";
}, 100);

// ==============================
// 3. 同意私聊
// ==============================
async function acceptPrivate() {
  if (!currentPrivateRequest) return;
  await supabaseClient
    .from("private_requests")
    .update({ status: "accepted" })
    .eq("id", currentPrivateRequest.id);

  document.getElementById("privateModal").style.display = "none";
  startPrivateChat(currentPrivateRequest.from_id);
  currentPrivateRequest = null;
}

// ==============================
// 4. 拒绝私聊
// ==============================
async function rejectPrivate() {
  if (!currentPrivateRequest) return;
  await supabaseClient
    .from("private_requests")
    .update({ status: "rejected" })
    .eq("id", currentPrivateRequest.id);

  document.getElementById("privateModal").style.display = "none";
  currentPrivateRequest = null;
}

// ==============================
// 5. 开始私聊（双方进入）
// ==============================
function startPrivateChat(target) {
  mode = "private";
  privatePartner = target;
  lastLoadedId = 0;
  loadedMessageIds.clear();
  document.getElementById("messages").innerHTML = "";
  document.getElementById("endPrivateBtn").style.display = "inline-block";
  document.getElementById("privateStatus").innerText = `私聊中：与 ${target}`;
}

// ==============================
// 6. 退出私聊
// ==============================
async function endPrivate() {
  mode = "group";
  privatePartner = null;
  currentPrivateRequest = null;

  document.getElementById("endPrivateBtn").style.display = "none";
  document.getElementById("privateStatus").innerText = "";
  document.getElementById("privateModal").style.display = "none";

  lastLoadedId = 0;
  loadedMessageIds.clear();
  document.getElementById("messages").innerHTML = "";
}
</script>
</body>
</html>
