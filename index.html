<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔞20岁的少年心事🔞</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  body {
    background: #111318;
    color: #eee;
    max-width: 500px;
    margin: 0 auto;
  }
  #login {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
  }
  .login-card {
    background: #252a33;
    padding: 40px 30px;
    border-radius: 20px;
    width: 100%;
    text-align: center;
  }
  .login-card h1 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #fff;
  }
  .login-card p {
    color: #999;
    margin-bottom: 20px;
  }
  #playerId {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2d3233;
    color: #fff;
    text-align: center;
    margin-bottom: 15px;
  }
  #loginBtn {
    width: 100%;
    padding: 12px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
  }
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  #header {
    background: #252a33;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #myInfo {
    font-weight: 500;
  }
  #privateStatus {
    color: #07c160;
    font-size: 12px;
    margin-left: 8px;
  }
  #togglePrivateBtn {
    background: #444;
    color: #fff;
    border: none;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  #privatePanel {
    background: #1d1f23;
    padding: 8px 14px;
    font-size: 13px;
    color: #ccc;
    display: none;
    border-bottom: 1px solid #333;
  }
  #privateList {
    line-height: 1.5;
  }
  .header-right {
    display: flex;
    gap: 6px;
  }
  #endPrivateBtn, #resetBtn {
    background: #ef4444;
    color: #fff;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  #endPrivateBtn {
    display: none;
  }
  #messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .sys {
    align-self: center;
    background: #333;
    color: #aaa;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
  }
  .msg {
    display: flex;
    gap: 8px;
    max-width: 75%;
  }
  .msg.me {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .avatar {
    width: 34px;
    height: 34px;
    background: #555;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    flex-shrink: 0;
  }
  .bubble {
    background: #2d3233;
    padding: 8px 12px;
    border-radius: 8px;
    line-height: 1.4;
  }
  .msg.me .bubble {
    background: #07c160;
    color: #fff;
  }
  #inputArea {
    display: flex;
    padding: 10px;
    background: #252a33;
    gap: 6px;
    align-items: center;
    position: relative;
  }
  #quickAddBtn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #6366f1;
    color: #fff;
    border: none;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #quickMenu {
    position: absolute;
    bottom: 55px;
    left: 10px;
    background: #252a33;
    border-radius: 10px;
    padding: 8px;
    display: none;
    flex-direction: column;
    gap: 6px;
    width: 170px;
    z-index: 999;
  }
  #quickMenu button {
    background: #383333;
    color: #fff;
    border: none;
    padding: 8px 10px;
    border-radius: 6px;
    text-align: left;
    cursor: pointer;
    font-size: 13px;
  }
  #quickMenu button:hover {
    background: #6366f1;
  }
  #msgInput {
    flex: 1;
    padding: 10px 14px;
    border-radius: 20px;
    border: none;
    background: #1a1d24;
    color: #fff;
    outline: none;
  }
  #sendBtn {
    padding: 10px 16px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
  }
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  .modalBox {
    background: #252a33;
    padding: 25px;
    border-radius: 14px;
    width: 90%;
    max-width: 350px;
    text-align: center;
  }
  .btnGroup {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }
  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  .ok {
    background: #07c160;
    color: #fff;
  }
  .no {
    background: #555;
  }
</style>
</head>
<body>
<div id="login">
  <div class="login-card">
    <h1>🔞20岁的少年心事🔞</h1>
    <p>输入 1‑8 号进入房间</p>
    <input id="playerId" placeholder="输入编号" maxlength="1">
    <button id="loginBtn">进入房间</button>
  </div>
</div>

<div id="app">
  <div id="header">
    <div>
      <span id="myInfo"></span>
      <span id="privateStatus"></span>
    </div>
    <button id="togglePrivateBtn">展开私聊状态</button>
    <div class="header-right">
      <button id="resetBtn">重置</button>
      <button id="endPrivateBtn">结束私聊</button>
    </div>
  </div>
  <div id="privatePanel">
    <div id="privateList">暂无私聊</div>
  </div>
  <div id="messages"></div>
  <div id="inputArea">
    <button id="quickAddBtn">+</button>
    <div id="quickMenu">
      <button data-t="我要和1号谈谈">我要和1号谈谈</button>
      <button data-t="我要和2号谈谈">我要和2号谈谈</button>
      <button data-t="我要和3号谈谈">我要和3号谈谈</button>
      <button data-t="我要和4号谈谈">我要和4号谈谈</button>
      <button data-t="我要和5号谈谈">我要和5号谈谈</button>
      <button data-t="我要和6号谈谈">我要和6号谈谈</button>
      <button data-t="我要和7号谈谈">我要和7号谈谈</button>
      <button data-t="我要和8号谈谈">我要和8号谈谈</button>
    </div>
    <input id="msgInput" placeholder="输入消息...">
    <button id="sendBtn">发送</button>
  </div>
</div>

<div id="privateModal" class="modal">
  <div class="modalBox">
    <h3 id="modalText"></h3>
    <div class="btnGroup">
      <button class="btn ok" id="acceptBtn">同意</button>
      <button class="btn no" id="rejectBtn">拒绝</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mronesaayjtjuhwvzouj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzINiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY";

let supabaseClient;
let me = null;
let mode = "group";
let privatePartner = null;
let lastLoadedId = 0;
let loadedMessageIds = new Set();

document.addEventListener('DOMContentLoaded', () => {
  supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { autoRefreshToken: false, persistSession: false, detectSessionInUrl: false }
  });

  document.getElementById('loginBtn').onclick = login;
  document.getElementById('sendBtn').onclick = send;
  document.getElementById('msgInput').onkeypress = e => e.key === 'Enter' && send();
  document.getElementById('endPrivateBtn').onclick = endPrivate;
  document.getElementById('acceptBtn').onclick = acceptPrivate;
  document.getElementById('rejectBtn').onclick = rejectPrivate;

  // + 号菜单：点一下 → 填入输入框（原始行为）
  const quickAddBtn = document.getElementById('quickAddBtn');
  const quickMenu = document.getElementById('quickMenu');
  const msgInput = document.getElementById('msgInput');

  quickAddBtn.onclick = (e) => {
    e.stopPropagation();
    quickMenu.style.display = quickMenu.style.display === 'flex' ? 'none' : 'flex';
  };
  document.body.onclick = () => { quickMenu.style.display = 'none'; };

  // 修复：点菜单只填文字，不自动申请私聊
  document.querySelectorAll('#quickMenu button').forEach(btn => {
    btn.onclick = () => {
      msgInput.value = btn.dataset.t;
      quickMenu.style.display = 'none';
      msgInput.focus();
    };
  });

  // 点头像 → 才发起私聊申请（原始行为）
  document.getElementById('messages').onclick = e => {
    const ava = e.target.closest('.avatar');
    if (!ava) return;
    const target = ava.dataset.id;
    if (target === me) return;
    sendPrivateRequest(target);
  };

  setInterval(loadNewMessages, 600);
  setInterval(checkPrivateRequest, 800);
});

async function login() {
  let v = (document.getElementById('playerId').value || '1').replace(/\D/g, '');
  v = Math.max(1, Math.min(8, +v));
  me = v + '号';
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myInfo').innerText = '我是：' + me;
}

// 发起私聊（仅点头像触发）
async function sendPrivateRequest(to) {
  await supabaseClient.from('private_requests').delete().or(`from_id.eq.${me},to_id.eq.${me}`);
  await supabaseClient.from('private_requests').insert([{
    from_id: me, to_id: to, status: 'pending'
  }]);

  mode = 'pending_private';
  privatePartner = to;
  lastLoadedId = 0;
  loadedMessageIds.clear();
  document.getElementById('messages').innerHTML = '';
  document.getElementById('privateStatus').innerText = `等待 ${to} 同意`;
  document.getElementById('endPrivateBtn').style.display = 'inline-block';
}

async function checkPrivateRequest() {
  if (mode !== 'group') return;
  const { data } = await supabaseClient
    .from('private_requests')
    .select('*')
    .eq('to_id', me)
    .eq('status', 'pending')
    .limit(1);

  if (data?.length) {
    window.curReq = data[0];
    document.getElementById('modalText').innerText = `${curReq.from_id} 想和你私聊`;
    document.getElementById('privateModal').style.display = 'flex';
  }
}

async function acceptPrivate() {
  if (!window.curReq) return;
  const from = window.curReq.from_id;

  await supabaseClient.from('private_requests')
    .update({ status: 'accepted' })
    .eq('id', window.curReq.id);

  document.getElementById('privateModal').style.display = 'none';

  mode = 'private';
  privatePartner = from;
  lastLoadedId = 0;
  loadedMessageIds.clear();
  document.getElementById('messages').innerHTML = '';
  document.getElementById('privateStatus').innerText = `私聊中：${from}`;
}

function rejectPrivate() {
  document.getElementById('privateModal').style.display = 'none';
}

function endPrivate() {
  mode = 'group';
  privatePartner = null;
  lastLoadedId = 0;
  loadedMessageIds.clear();
  document.getElementById('privateStatus').innerText = '';
  document.getElementById('endPrivateBtn').style.display = 'none';
}

async function loadNewMessages() {
  if (!me) return;

  if (mode === 'pending_private' && privatePartner) {
    const { data } = await supabaseClient
      .from('private_requests')
      .select('status')
      .eq('from_id', me)
      .eq('to_id', privatePartner)
      .maybeSingle();

    if (data?.status === 'accepted') {
      mode = 'private';
      document.getElementById('privateStatus').innerText = `私聊中：${privatePartner}`;
    }
  }

  let q = supabaseClient
    .from('messages')
    .select('*')
    .gt('id', lastLoadedId)
    .order('id', { ascending: true });

  if (mode === 'group') {
    q = q.eq('type', 'public');
  } else {
    q = q.eq('type', 'private').or(`from_id.eq.${me},to_id.eq.${me}`);
  }

  const { data: list } = await q;
  if (!list) return;

  const dom = document.getElementById('messages');
  list.forEach(m => {
    if (loadedMessageIds.has(m.id)) return;
    loadedMessageIds.add(m.id);
    lastLoadedId = Math.max(lastLoadedId, m.id);

    const num = m.from_id.replace('号', '');
    const isMe = m.from_id === me;
    dom.insertAdjacentHTML('beforeend', `
      <div class="msg ${isMe ? 'me' : ''}">
        <div class="avatar" data-id="${m.from_id}">${num}</div>
        <div class="bubble">${m.content}</div>
      </div>
    `);
  });

  dom.scrollTop = dom.scrollHeight;
}

// 发送：完全修复，公聊/私聊都正常
async function send() {
  const txt = document.getElementById('msgInput').value.trim();
  if (!txt || !me) return;

  const msgType = mode === 'group' ? 'public' : 'private';
  const to = mode === 'group' ? 'all' : privatePartner;

  await supabaseClient.from('messages').insert([{
    from_id: me,
    content: txt,
    type: msgType,
    to_id: to
  }]);

  document.getElementById('msgInput').value = '';
}
</script>
</body>
</html>
