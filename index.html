<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔞20岁的少年心事🔞</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  body {
    background: #111318;
    color: #eee;
    max-width: 500px;
    margin: 0 auto;
  }
  #login {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
  }
  .login-card {
    background: #252a33;
    padding: 40px 30px;
    border-radius: 20px;
    width: 100%;
    text-align: center;
  }
  .login-card h1 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #fff;
  }
  .login-card p {
    color: #999;
    margin-bottom: 20px;
  }
  #playerId {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2d323d;
    color: #fff;
    text-align: center;
    margin-bottom: 15px;
  }
  #loginBtn {
    width: 100%;
    padding: 12px;
    background: #07c130;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
  }
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  #header {
    background: #252a33;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #myInfo { font-weight: 500; }
  #privateStatus {
    color: #07c130;
    font-size: 12px;
    margin-left: 8px;
  }
  #togglePrivateBtn {
    background: #444;
    color: #fff;
    border: none;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  #privatePanel {
    background: #1d1f23;
    padding: 8px 14px;
    font-size: 13px;
    color: #ccc;
    display: none;
    border-bottom: 1px solid #333;
  }
  #privateList { line-height: 1.5; }
  .header-right { display: flex; gap: 6px; }
  #endPrivateBtn, #resetBtn {
    background: #ef4444;
    color: #fff;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  #endPrivateBtn { display: none; }
  #messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .sys {
    align-self: center;
    background: #333;
    color: #aaa;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
  }
  .msg { display: flex; gap: 8px; max-width: 75%; }
  .msg.me { align-self: flex-end; flex-direction: row-reverse; }
  .avatar {
    width: 34px;
    height: 34px;
    background: #555;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    flex-shrink: 0;
  }
  .bubble {
    background: #2d323d;
    padding: 8px 12px;
    border-radius: 8px;
    line-height: 1.4;
  }
  .msg.me .bubble { background: #07c130; color: #fff; }

  #inputArea {
    display: flex;
    padding: 10px;
    background: #252a33;
    gap: 6px;
    align-items: center;
    position: relative;
  }

  #quickBtn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #6366f1;
    color: #fff;
    border: none;
    font-size: 18px;
    cursor: pointer;
  }

  #quickMenu {
    position: absolute;
    bottom: 55px;
    left: 10px;
    background: #252a33;
    border-radius: 10px;
    padding: 8px;
    display: none;
    flex-direction: column;
    gap: 6px;
    width: 170px;
    z-index: 999;
  }
  #quickMenu button {
    background: #383838;
    color: #fff;
    border: none;
    padding: 8px 10px;
    border-radius: 6px;
    text-align: left;
    cursor: pointer;
  }
  #quickMenu button:hover {
    background: #6366f1;
  }

  #msgInput {
    flex: 1;
    padding: 10px 14px;
    border-radius: 20px;
    border: none;
    background: #1a1d24;
    color: #fff;
    outline: none;
  }
  #sendBtn {
    padding: 10px 16px;
    background: #07c130;
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
  }

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  .modalBox {
    background: #252a33;
    padding: 25px;
    border-radius: 14px;
    width: 90%;
    max-width: 350px;
    text-align: center;
  }
  .btnGroup {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }
  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  .ok { background: #07c130; color: #fff; }
  .no { background: #555; }
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <h1>🔞20岁的少年心事🔞</h1>
    <p>输入 1‑8 进入房间</p>
    <input id="playerId" placeholder="输入编号" maxlength="1">
    <button id="loginBtn">进入房间</button>
  </div>
</div>

<div id="app">
  <div id="header">
    <div>
      <span id="myInfo"></span>
      <span id="privateStatus"></span>
    </div>
    <button id="togglePrivateBtn">状态</button>
    <div class="header-right">
      <button id="resetBtn">重置</button>
      <button id="endPrivateBtn">结束私聊</button>
    </div>
  </div>

  <div id="privatePanel">
    <div id="privateList">暂无私聊</div>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <button id="quickBtn">+</button>
    <div id="quickMenu">
      <button data-text="我要和1号谈谈">我要和1号谈谈</button>
      <button data-text="我要和2号谈谈">我要和2号谈谈</button>
      <button data-text="我要和3号谈谈">我要和3号谈谈</button>
      <button data-text="我要和4号谈谈">我要和4号谈谈</button>
      <button data-text="我要和5号谈谈">我要和5号谈谈</button>
      <button data-text="我要和6号谈谈">我要和6号谈谈</button>
      <button data-text="我要和7号谈谈">我要和7号谈谈</button>
      <button data-text="我要和8号谈谈">我要和8号谈谈</button>
    </div>
    <input id="msgInput" placeholder="输入消息...">
    <button id="sendBtn">发送</button>
  </div>
</div>

<div id="privateModal" class="modal">
  <div class="modalBox">
    <h3 id="modalText"></h3>
    <div class="btnGroup">
      <button class="btn ok" id="acceptBtn">同意</button>
      <button class="btn no" id="rejectBtn">拒绝</button>
    </div>
  </div>
</div>

<div id="resetModal" class="modal">
  <div class="modalBox">
    <h3>重置房间</h3>
    <input id="resetPwd" type="password" placeholder="密码" style="width:100%;padding:12px;border-radius:8px;border:none;background:#1a1d24;color:#fff;text-align:center;margin-bottom:20px">
    <div class="btnGroup">
      <button class="btn no" id="cancelResetBtn">取消</button>
      <button class="btn ok" id="confirmResetBtn">确认重置</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mronesaayjtjuhwvzouj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY";
const ADMIN_PWD = "admin123";

let supabaseClient;
let me = null;
let mode = "group";
let privatePartner = null;
let lastLoadedId = 0;
let loadedIds = new Set();

document.addEventListener('DOMContentLoaded', () => {
  supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  document.getElementById('loginBtn').onclick = login;
  document.getElementById('togglePrivateBtn').onclick = togglePrivatePanel;
  document.getElementById('resetBtn').onclick = showResetModal;
  document.getElementById('endPrivateBtn').onclick = endPrivate;
  document.getElementById('sendBtn').onclick = send;
  document.getElementById('msgInput').onkeypress = e => e.key === 'Enter' && send();
  document.getElementById('acceptBtn').onclick = acceptPrivate;
  document.getElementById('rejectBtn').onclick = rejectPrivate;
  document.getElementById('cancelResetBtn').onclick = closeResetModal;
  document.getElementById('confirmResetBtn').onclick = confirmReset;

  // 快捷按钮
  const quickBtn = document.getElementById('quickBtn');
  const quickMenu = document.getElementById('quickMenu');
  quickBtn.onclick = e => {
    e.stopPropagation();
    quickMenu.style.display = quickMenu.style.display === 'flex' ? 'none' : 'flex';
  };
  quickMenu.onclick = e => {
    e.stopPropagation();
    const btn = e.target.closest('[data-text]');
    if (btn) {
      document.getElementById('msgInput').value = btn.dataset.text;
      quickMenu.style.display = 'none';
    }
  };
  document.onclick = e => {
    if (!quickBtn.contains(e.target) && !quickMenu.contains(e.target)) quickMenu.style.display = 'none';
  };

  document.getElementById('messages').onclick = e => {
    const ava = e.target.closest('.avatar');
    if (!ava) return;
    const t = ava.dataset.id;
    if (t !== me) sendPrivateRequest(t);
  };

  setInterval(loadMessages, 400);
  setInterval(checkPrivateRequest, 600);
});

// 登录
async function login() {
  let v = (document.getElementById('playerId').value || '1').replace(/\D/g, '');
  v = Math.max(1, Math.min(8, v));
  me = v + '号';
  await supabaseClient.from('players').upsert({ player_id: me, status: 'online', is_private_chat_with: null }, { onConflict: 'player_id' });
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myInfo').innerText = '我是：' + me;
}

// 发送私聊申请
async function sendPrivateRequest(to) {
  await supabaseClient.from('private_requests').insert([{ from_id: me, to_id: to, status: 'pending' }]);
  alert('已向 ' + to + ' 发起私聊申请');
}

// 检查私聊请求
async function checkPrivateRequest() {
  if (mode === 'private') return;
  const { data: reqs } = await supabaseClient
    .from('private_requests')
    .select('*')
    .eq('to_id', me)
    .eq('status', 'pending')
    .limit(1);
  if (!reqs || reqs.length === 0) return;
  const r = reqs[0];
  document.getElementById('modalText').innerText = r.from_id + ' 想和你私聊';
  document.getElementById('privateModal').style.display = 'flex';
  window.curReq = r;
}

// ---------------- 👇 这里是极简私聊修复，100% 不秒退 👇 ----------------
async function acceptPrivate() {
  if (!window.curReq) return;
  const from = window.curReq.from_id;

  // 只更新请求状态
  await supabaseClient.from('private_requests').update({ status: 'accepted' }).eq('id', window.curReq.id);

  // 本地直接进入私聊，不监听、不检测、不秒退！
  mode = 'private';
  privatePartner = from;
  document.getElementById('endPrivateBtn').style.display = 'inline-block';
  document.getElementById('privateModal').style.display = 'none';
  document.getElementById('privateStatus').innerText = `（私聊中：${from}）`;
  lastLoadedId = 0;
  loadedIds.clear();
}

// 结束私聊（手动点才退）
async function endPrivate() {
  mode = 'group';
  privatePartner = null;
  document.getElementById('endPrivateBtn').style.display = 'none';
  document.getElementById('privateStatus').innerText = '';
  lastLoadedId = 0;
  loadedIds.clear();
}

// 拒绝私聊
function rejectPrivate() {
  if (window.curReq) supabaseClient.from('private_requests').update({ status: 'rejected' }).eq('id', window.curReq.id);
  document.getElementById('privateModal').style.display = 'none';
}
// ---------------- 👆 极简修复结束 👆 ----------------

// 加载消息（修复重复）
async function loadMessages() {
  const { data: list } = await supabaseClient
    .from('messages')
    .select('*')
    .gt('id', lastLoadedId)
    .order('id', { ascending: true });

  if (!list || list.length === 0) return;
  const dom = document.getElementById('messages');

  for (const m of list) {
    if (loadedIds.has(m.id)) continue;
    loadedIds.add(m.id);
    if (m.id > lastLoadedId) lastLoadedId = m.id;

    if (mode === 'group' && m.type !== 'public') continue;
    if (mode === 'private') {
      const ok = (m.from_id === me && m.to_id === privatePartner) || (m.from_id === privatePartner && m.to_id === me);
      if (!ok) continue;
    }

    if (m.type === 'system') {
      dom.insertAdjacentHTML('beforeend', `<div class="sys">${m.content}</div>`);
    } else {
      const num = m.from_id.replace('号', '');
      const cls = m.from_id === me ? 'msg me' : 'msg';
      dom.insertAdjacentHTML('beforeend', `
        <div class="${cls}">
          <div class="avatar" data-id="${m.from_id}">${num}</div>
          <div class="bubble">${m.content}</div>
        </div>
      `);
    }
  }
  dom.scrollTop = dom.scrollHeight;
}

// 发送消息
async function send() {
  const i = document.getElementById('msgInput');
  const c = i.value.trim();
  if (!c) return;
  await supabaseClient.from('messages').insert([{
    from_id: me,
    content: c,
    type: mode === 'group' ? 'public' : 'private',
    to_id: mode === 'group' ? 'all' : privatePartner
  }]);
  i.value = '';
}

function togglePrivatePanel() {
  const p = document.getElementById('privatePanel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function showResetModal() { document.getElementById('resetModal').style.display = 'flex'; }
function closeResetModal() { document.getElementById('resetModal').style.display = 'none'; }
async function confirmReset() {
  if (document.getElementById('resetPwd').value !== ADMIN_PWD) return alert('密码错误');
  await supabaseClient.from('messages').delete().neq('id', 0);
  await supabaseClient.from('players').delete().neq('id', 0);
  await supabaseClient.from('private_requests').delete().neq('id', 0);
  alert('重置成功');
  location.reload();
}
</script>
</body>
</html>
