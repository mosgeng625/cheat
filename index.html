<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>匿名聊天室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
body{background:#EBEBEB;max-width:500px;margin:0 auto}

/* 登录 */
#login{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:0 20px}
#login h1{font-size:24px;color:#333}
#playerId{width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:8px;font-size:16px;text-align:center}
#login button{width:100%;padding:12px;background:#07C160;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.error{color:red;font-size:14px}

/* 主界面 */
#app{display:none;height:100vh;flex-direction:column;background:#EBEBEB}
#header{padding:14px;background:#fff;text-align:center;font-weight:bold;border-bottom:1px solid #E0E0E0}

/* 消息区 */
#messages{flex:1;padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.msg-system{align-self:center;background:rgba(0,0,0,0.1);color:#666;padding:4px 10px;border-radius:4px;font-size:12px}

/* 别人的消息：左头像 + 左气泡 */
.msg-other{align-self:flex-start;display:flex;gap:8px;max-width:70%}
.avatar{width:36px;height:36px;background:#bbb;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:14px;flex-shrink:0}
.msg-other .bubble{background:#fff;padding:10px 12px;border-radius:8px;position:relative;word-break:break-all;font-size:16px;line-height:1.4}

/* 自己的消息：右气泡 + 右头像 */
.msg-me{align-self:flex-end;display:flex;flex-direction:row-reverse;gap:8px;max-width:70%}
.msg-me .bubble{background:#95EC69;padding:10px 12px;border-radius:8px;word-break:break-all;font-size:16px;line-height:1.4}

/* 输入框 */
#input-area{display:flex;padding:10px;background:#fff;gap:8px;border-top:1px solid #E0E0E0}
#msgInput{flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:16px}
#sendBtn{padding:8px 16px;background:#07C160;color:#fff;border:none;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<div id="login">
  <h1>匿名聊天室</h1>
  <input id="playerId" placeholder="输入1-8进入房间" maxlength="1">
  <button onclick="enterRoom()">进入房间</button>
  <p id="loginError" class="error"></p>
</div>

<div id="app">
  <div id="header"><span id="myId"></span></div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="msgInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mronesaayjtjuhwvzouj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: false } });

let myId = null;

// 进入房间
async function enterRoom() {
  const input = document.getElementById('playerId').value.trim();
  const err = document.getElementById('loginError');
  err.innerText = '';

  let num = input.replace(/\D/g, '') || '1';
  num = Math.max(1, Math.min(8, num));
  const id = num + '号';

  const timeLimit = new Date(Date.now() - 30000).toISOString();
  const { data: exist } = await supabaseClient
    .from('players').select('*').eq('player_id', id).gt('last_seen', timeLimit).maybeSingle();

  if (exist) { err.innerText = '编号已被占用'; return; }

  myId = id;
  await supabaseClient.from('players').upsert({ player_id: id, last_seen: new Date().toISOString() });

  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myId').innerText = '我是：' + myId;

  setInterval(loadMessages, 600);
}

// 加载消息
async function loadMessages() {
  const { data: msgList } = await supabaseClient
    .from('messages').select('*').order('created_at', { ascending: true });

  const dom = document.getElementById('messages');
  let html = '';

  msgList.forEach(m => {
    if (m.type === 'system') {
      html += `<div class="msg-system">${m.content}</div>`;
      return;
    }

    const numText = m.from_id.replace('号', '');

    if (m.from_id === myId) {
      html += `
        <div class="msg-me">
          <div class="avatar">${numText}</div>
          <div class="bubble">${m.content}</div>
        </div>
      `;
    } else {
      html += `
        <div class="msg-other">
          <div class="avatar">${numText}</div>
          <div class="bubble">${m.content}</div>
        </div>
      `;
    }
  });

  dom.innerHTML = html;
  dom.scrollTop = dom.scrollHeight;
}

// 发送消息
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !myId) return;

  await supabaseClient.from('messages').insert({
    type: 'public', from_id: myId, to_id: 'all', content: content
  });

  input.value = '';
  loadMessages();
}
</script>
</body>
</html>
