<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔞20岁的少年心事🔞</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  body {
    background: #111318;
    color: #eee;
    max-width: 500px;
    margin: 0 auto;
  }
  #modeSelect {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    gap: 20px;
  }
  .mode-card {
    background: #252a33;
    padding: 40px 30px;
    border-radius: 20px;
    width: 100%;
    text-align: center;
  }
  .mode-card h1 {
    font-size: 24px;
    margin-bottom: 20px;
    color: #fff;
  }
  .mode-btn {
    width: 100%;
    padding: 12px;
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 10px;
    font-size: 16px;
  }

  #login, #nicknameLogin {
    height: 100vh;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
  }
  .login-card {
    background: #252a33;
    padding: 40px 30px;
    border-radius: 20px;
    width: 100%;
    text-align: center;
  }
  .login-card h1 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #fff;
  }
  .login-card p {
    color: #999;
    margin-bottom: 20px;
  }
  #playerId, #nicknameInput {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2d323d;
    color: #fff;
    text-align: center;
    margin-bottom: 15px;
  }
  #loginBtn, #nicknameLoginBtn {
    width: 100%;
    padding: 12px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
  }

  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  #header {
    background: #252a33;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #myInfo { font-weight: 500; }
  #privateStatus {
    color: #07c160;
    font-size: 12px;
    margin-left: 8px;
  }
  #togglePrivateBtn {
    background: #444;
    color: #fff;
    border: none;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  #privatePanel {
    background: #1d1f23;
    padding: 8px 14px;
    font-size: 13px;
    color: #ccc;
    display: none;
    border-bottom: 1px solid #333;
  }
  #privateList { line-height: 1.5; }
  .header-right { display: flex; gap: 6px; align-items: center; }
  #backBtn {
    background: #555;
    color: #fff;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  #endPrivateBtn, #resetBtn {
    background: #ef4444;
    color: #fff;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  #endPrivateBtn { display: none; }

  #messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .sys {
    align-self: center;
    background: #333;
    color: #aaa;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
  }

  .msg {
    display: flex;
    gap: 8px;
    max-width: 85%;
  }
  .msg.me {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .avatar {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .sender-name {
    font-size: 11px;
    color: #aaa;
    margin-bottom: 3px;
  }
  .msg.me .sender-name {
    text-align: right;
    color: #e0e0e0;
  }

  .bubble {
    background: #2d323d;
    padding: 8px 12px;
    border-radius: 8px;
    line-height: 1.4;
  }
  .msg.me .bubble {
    background: #07c160;
    color: #fff;
  }

  .private-tag {
    font-size: 10px;
    color: #6366f1;
    margin-left: 4px;
  }
  .msg.me .private-tag { color: #fff; }

  #inputArea {
    display: flex;
    padding: 10px;
    background: #252a33;
    gap: 6px;
    align-items: center;
    position: relative;
  }
  #quickAddBtn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #6366f1;
    color: #fff;
    border: none;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: none;
  }
  #quickMenu {
    position: absolute;
    bottom: 55px;
    left: 10px;
    background: #252a33;
    border-radius: 10px;
    padding: 8px;
    display: none;
    flex-direction: column;
    gap: 6px;
    width: 170px;
    z-index: 999;
  }
  #quickMenu button {
    background: #383838;
    color: #fff;
    border: none;
    padding: 8px 10px;
    border-radius: 6px;
    text-align: left;
    cursor: pointer;
    font-size: 13px;
  }
  #quickMenu button:hover { background: #6366f1; }
  #msgInput {
    flex: 1;
    padding: 10px 14px;
    border-radius: 20px;
    border: none;
    background: #1a1d24;
    color: #fff;
    outline: none;
  }
  #sendBtn {
    padding: 10px 16px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
  }

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  .modalBox {
    background: #252a33;
    padding: 25px;
    border-radius: 14px;
    width: 90%;
    max-width: 350px;
    text-align: center;
  }
  .btnGroup {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }
  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  .ok { background: #07c160; color: #fff; }
  .no { background: #555; color: #fff; }
</style>
</head>
<body>

<div id="modeSelect">
  <div class="mode-card">
    <h1>🔞20岁的少年心事🔞</h1>
    <button class="mode-btn" id="roomModeBtn">房间轮模式</button>
    <button class="mode-btn" id="spyModeBtn">无间道模式</button>
  </div>
</div>

<div id="login">
  <div class="login-card">
    <h1>房间轮模式</h1>
    <p>输入 1‑8 进入房间</p>
    <input id="playerId" placeholder="输入编号" maxlength="1">
    <button id="loginBtn">进入房间</button>
  </div>
</div>

<div id="nicknameLogin">
  <div class="login-card">
    <h1>无间道模式</h1>
    <p>输入你的名字（不限长度）</p>
    <input id="nicknameInput" placeholder="输入名字">
    <button id="nicknameLoginBtn">进入聊天</button>
  </div>
</div>

<div id="app">
  <div id="header">
    <div>
      <span id="myInfo"></span>
      <span id="privateStatus"></span>
    </div>
    <button id="togglePrivateBtn">展开私聊状态</button>
    <div class="header-right">
      <button id="backBtn">返回</button>
      <button id="resetBtn">重置</button>
      <button id="endPrivateBtn">结束私聊</button>
    </div>
  </div>
  <div id="privatePanel"><div id="privateList">暂无私聊</div></div>
  <div id="messages"></div>
  <div id="inputArea">
    <button id="quickAddBtn">+</button>
    <div id="quickMenu">
      <button data-t="我要和1号谈谈">我要和1号谈谈</button>
      <button data-t="我要和2号谈谈">我要和2号谈谈</button>
      <button data-t="我要和3号谈谈">我要和3号谈谈</button>
      <button data-t="我要和4号谈谈">我要和4号谈谈</button>
      <button data-t="我要和5号谈谈">我要和5号谈谈</button>
      <button data-t="我要和6号谈谈">我要和6号谈谈</button>
      <button data-t="我要和7号谈谈">我要和7号谈谈</button>
      <button data-t="我要和8号谈谈">我要和8号谈谈</button>
    </div>
    <input id="msgInput" placeholder="输入消息...">
    <button id="sendBtn">发送</button>
  </div>
</div>

<div id="privateModal" class="modal">
  <div class="modalBox">
    <h3 id="modalText"></h3>
    <div class="btnGroup">
      <button class="btn ok" id="acceptBtn">同意</button>
      <button class="btn no" id="rejectBtn">拒绝</button>
    </div>
  </div>
</div>

<div id="resetModal" class="modal">
  <div class="modalBox">
    <h3>重置房间</h3>
    <input id="resetPwd" type="password" placeholder="密码" style="width:100%;padding:12px;border-radius:8px;border:none;background:#1a1d24;color:#fff;text-align:center;margin-bottom:20px">
    <div class="btnGroup">
      <button class="btn no" id="cancelResetBtn">取消</button>
      <button class="btn ok" id="confirmResetBtn">确认重置</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mronesaayjtjuhwvzouj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY";
const ADMIN_PWD = "admin123";

let supabaseClient;
let me = null;
let currentMode = null; // room / spy
let mode = "group";
let privatePartner = null;
let lastLoadedId = 0;
let loadedMessageIds = new Set();
let isLoading = false;

let privateCheckTimer = null;
let privateWaitTimer = null;
let watchExitTimer = null;

document.addEventListener('DOMContentLoaded', () => {
  supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  document.getElementById('roomModeBtn').onclick = () => {
    document.getElementById('modeSelect').style.display = 'none';
    document.getElementById('login').style.display = 'flex';
    currentMode = 'room';
  };
  document.getElementById('spyModeBtn').onclick = () => {
    document.getElementById('modeSelect').style.display = 'none';
    document.getElementById('nicknameLogin').style.display = 'flex';
    currentMode = 'spy';
  };

  document.getElementById('backBtn').onclick = backToModeSelect;
  document.getElementById('loginBtn').onclick = login;
  document.getElementById('nicknameLogin').onclick = nicknameLogin;
  document.getElementById('togglePrivateBtn').onclick = togglePrivatePanel;
  document.getElementById('resetBtn').onclick = showResetModal;
  document.getElementById('endPrivateBtn').onclick = endPrivate;
  document.getElementById('sendBtn').onclick = send;
  document.getElementById('msgInput').onkeypress = e => { if (e.key === 'Enter') send(); };
  document.getElementById('acceptBtn').onclick = acceptPrivate;
  document.getElementById('rejectBtn').onclick = rejectPrivate;
  document.getElementById('cancelResetBtn').onclick = closeResetModal;
  document.getElementById('confirmResetBtn').onclick = confirmReset;

  const quickAddBtn = document.getElementById('quickAddBtn');
  const quickMenu = document.getElementById('quickMenu');
  quickAddBtn.onclick = e => { e.stopPropagation(); quickMenu.style.display = quickMenu.style.display === 'flex' ? 'none' : 'flex'; };
  quickMenu.onclick = e => {
    const btn = e.target.closest('[data-t]');
    if (btn) { document.getElementById('msgInput').value = btn.dataset.t; quickMenu.style.display = 'none'; }
  };
  document.onclick = () => quickMenu.style.display = 'none';
  document.getElementById('messages').onclick = e => {
    const ava = e.target.closest('.avatar');
    if (!ava) return;
    const target = ava.dataset.id;
    if (target === me) return;
    sendPrivateRequest(target);
  };

  setInterval(loadNewMessages, 400);
});

function backToModeSelect() {
  me = null;
  mode = "group";
  privatePartner = null;
  lastLoadedId = 0;
  loadedMessageIds.clear();

  clearInterval(privateCheckTimer);
  clearInterval(privateWaitTimer);
  clearInterval(watchExitTimer);

  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'none';
  document.getElementById('nicknameLogin').style.display = 'none';
  document.getElementById('modeSelect').style.display = 'flex';
  document.getElementById('messages').innerHTML = '';
  document.getElementById('privateStatus').innerText = '';
  document.getElementById('endPrivateBtn').style.display = 'none';
}

async function login() {
  let v = (document.getElementById('playerId').value || '1').replace(/\D/g, '');
  v = Math.max(1, Math.min(8, v));
  me = `room_${v}`;
  await supabaseClient.from('players').upsert({
    player_id: me, status: 'online', is_private_chat_with: null, mode: currentMode
  }, { onConflict: 'player_id' });

  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myInfo').innerText = '我是：' + me.replace('room_','')+'号';
  document.getElementById('togglePrivateBtn').style.display = 'inline-block';
  document.getElementById('quickAddBtn').style.display = 'block';
  setInterval(checkPrivateRequest, 600);
  refreshPrivatePanel();
}

async function nicknameLogin() {
  let nickname = document.getElementById('nicknameInput').value.trim();
  if (!nickname) { alert('请输入名字'); return; }
  me = `spy_${nickname}`;
  await supabaseClient.from('players').upsert({
    player_id: me, status: 'online', is_private_chat_with: null, mode: currentMode
  }, { onConflict: 'player_id' });

  document.getElementById('nicknameLogin').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myInfo').innerText = '我是：' + nickname;
  document.getElementById('togglePrivateBtn').style.display = 'none';
  document.getElementById('quickAddBtn').style.display = 'none';
  setInterval(checkPrivateRequest, 600);
  refreshPrivatePanel();
}

async function sendSystemMessage(content) {
  if (currentMode === 'spy') return;
  await supabaseClient.from('messages').insert([{
    from_id: me, content: content, type: 'system', to_id: 'all', mode: currentMode
  }]);
}

function refreshPrivatePanel() {
  if (document.getElementById('privatePanel').style.display === 'block') {
    loadActivePrivateList();
  }
}

function togglePrivatePanel() {
  const panel = document.getElementById('privatePanel');
  const btn = document.getElementById('togglePrivateBtn');
  if (panel.style.display === 'block') {
    panel.style.display = 'none'; btn.innerText = '展开私聊状态';
  } else {
    panel.style.display = 'block'; btn.innerText = '收起私聊状态';
    loadActivePrivateList();
  }
}

async function loadActivePrivateList() {
  if (!me) return;
  try {
    const { data } = await supabaseClient
      .from('private_requests')
      .select('*')
      .eq('mode', currentMode)
      .or(`from_id.eq.${me},to_id.eq.${me}`)
      .eq('status', 'accepted');

    const list = document.getElementById('privateList');
    if (!data || data.length === 0) { list.innerText = '当前：未在私聊中'; return; }
    const partners = new Set();
    data.forEach(r => {
      let f = r.from_id; let t = r.to_id;
      if(currentMode==='room'){f=f.replace('room_','')+'号';t=t.replace('room_','')+'号';}
      if(currentMode==='spy'){f=f.replace('spy_','');t=f.replace('spy_','');}
      if (r.from_id === me) partners.add(t);
      if (r.to_id === me) partners.add(f);
    });
    list.innerText = '私聊中：' + Array.from(partners).join('、');
  } catch (e) {
    document.getElementById('privateList').innerText = '私聊状态加载失败';
  }
}

async function sendPrivateRequest(to) {
  if (!me || !to) return;
  clearAllTimers();
  await supabaseClient.from('private_requests').delete().eq('mode', currentMode).or(`from_id.eq.${me},to_id.eq.${me}`);
  mode = 'private'; privatePartner = to;
  document.getElementById('endPrivateBtn').style.display = 'inline-block';
  await supabaseClient.from('private_requests').insert([{
    from_id: me, to_id: to, status: 'pending', mode: currentMode
  }]);

  let sec = 6;
  privateWaitTimer = setInterval(() => {
    sec--;
    let showTo = to;
    if(currentMode==='room') showTo = to.replace('room_','')+'号';
    if(currentMode==='spy') showTo = to.replace('spy_','');
    document.getElementById('privateStatus').innerText = `等待 ${showTo} 同意（${sec}秒）`;
    if (sec <= 0) { clearAllTimers(); endPrivate(); alert('未同意'); }
  }, 1000);

  privateCheckTimer = setInterval(async () => {
    const { data } = await supabaseClient
      .from('private_requests')
      .select('*')
      .eq('mode', currentMode)
      .or(`and(from_id.eq.${me},to_id.eq.${to}),and(from_id.eq.${to},to_id.eq.${me})`)
      .eq('status', 'accepted').maybeSingle();
    if (data) {
      clearInterval(privateWaitTimer); clearInterval(privateCheckTimer);
      privatePartner = to; mode = 'private';
      let showTo = to;
      if(currentMode==='room') showTo = to.replace('room_','')+'号';
      if(currentMode==='spy') showTo = to.replace('spy_','');
      document.getElementById('privateStatus').innerText = `已与 ${showTo} 私聊中`;
      startWatchExit(); refreshPrivatePanel();
    }
  }, 400);
}

async function checkPrivateRequest() {
  if (mode === 'private' || document.getElementById('privateModal').style.display === 'flex') return;
  const { data } = await supabaseClient
    .from('private_requests')
    .select('*')
    .eq('mode', currentMode)
    .eq('to_id', me)
    .eq('status', 'pending')
    .order('created_at', { ascending: false }).limit(1);
  if (!data || data.length === 0) return;
  window.curPrivateReq = data[0];
  let showFrom = data[0].from_id;
  if(currentMode==='room') showFrom = showFrom.replace('room_','')+'号';
  if(currentMode==='spy') showFrom = showFrom.replace('spy_','');
  document.getElementById('modalText').innerText = showFrom + ' 想和你私聊';
  document.getElementById('privateModal').style.display = 'flex';
}

async function acceptPrivate() {
  if (!window.curPrivateReq) return;
  const from = window.curPrivateReq.from_id;
  await supabaseClient.from('private_requests').update({ status: 'accepted' }).eq('id', window.curPrivateReq.id);
  mode = 'private'; privatePartner = from;
  document.getElementById('endPrivateBtn').style.display = 'inline-block';
  document.getElementById('privateModal').style.display = 'none';
  let showFrom = from;
  if(currentMode==='room') showFrom = showFrom.replace('room_','')+'号';
  if(currentMode==='spy') showFrom = showFrom.replace('spy_','');
  document.getElementById('privateStatus').innerText = `已与 ${showFrom} 私聊中`;
  startWatchExit(); refreshPrivatePanel();
}

function rejectPrivate() {
  if (window.curPrivateReq) {
    supabaseClient.from('private_requests').update({ status: 'rejected' }).eq('id', window.curPrivateReq.id);
  }
  document.getElementById('privateModal').style.display = 'none';
}

function startWatchExit() {
  if (!privatePartner) return;
  if (watchExitTimer) clearInterval(watchExitTimer);
  watchExitTimer = setInterval(async () => {
    const { data } = await supabaseClient
      .from('private_requests')
      .select('*')
      .eq('mode', currentMode)
      .or(`and(from_id.eq.${me},to_id.eq.${privatePartner}),and(from_id.eq.${privatePartner},to_id.eq.${me})`)
      .eq('status', 'accepted').maybeSingle();
    if (!data && mode === 'private') {
      clearInterval(watchExitTimer);
      const who = privatePartner;
      privatePartner = null; mode = 'group';
      document.getElementById('endPrivateBtn').style.display = 'none';
      document.getElementById('privateStatus').innerText = '';
      refreshPrivatePanel();
    }
  }, 600);
}

async function endPrivate() {
  if (privatePartner) {
    await supabaseClient.from('private_requests').delete()
      .eq('mode', currentMode)
      .or(`and(from_id.eq.${me},to_id.eq.${privatePartner}),and(from_id.eq.${privatePartner},to_id.eq.${me})`);
  }
  clearAllTimers();
  privatePartner = null; mode = 'group';
  document.getElementById('endPrivateBtn').style.display = 'none';
  document.getElementById('privateStatus').innerText = '';
  refreshPrivatePanel();
}

function clearAllTimers(){
  clearInterval(privateWaitTimer); clearInterval(privateCheckTimer); clearInterval(watchExitTimer);
}

async function loadNewMessages() {
  if (isLoading) return;
  isLoading = true;
  try {
    const { data } = await supabaseClient
      .from('messages')
      .select('*')
      .eq('mode', currentMode)
      .gt('id', lastLoadedId)
      .order('created_at', { ascending: true });

    if (!data) return;
    const dom = document.getElementById('messages');
    for (const m of data) {
      if (loadedMessageIds.has(m.id)) continue;
      loadedMessageIds.add(m.id);

      const show = (
        mode === 'group' && m.type === 'public' ||
        mode === 'private' && (
          (m.from_id === me && m.to_id === privatePartner) ||
          (m.from_id === privatePartner && m.to_id === me)
        )
      );
      if (!show) continue;

      if (m.type === 'system') {
        dom.insertAdjacentHTML('beforeend', `<div class="sys">${m.content}</div>`);
      } else {
        const isMe = m.from_id === me;
        const tag = m.type === 'private' ? '<span class="private-tag">[私聊]</span>' : '';
        
        let showName = m.from_id;
        if (currentMode === 'room') showName = m.from_id.replace('room_','')+'号';
        if (currentMode === 'spy') showName = m.from_id.replace('spy_','');
        const first = showName.charAt(0);

        dom.insertAdjacentHTML('beforeend', `
          <div class="msg ${isMe ? 'me' : ''}">
            <div class="avatar" data-id="${m.from_id}">${first}</div>
            <div style="flex:1">
              <div class="sender-name">${showName}</div>
              <div class="bubble">${m.content}${tag}</div>
            </div>
          </div>
        `);
      }
      if (m.id > lastLoadedId) lastLoadedId = m.id;
    }
    dom.scrollTop = dom.scrollHeight;
  } finally {
    isLoading = false;
  }
}

async function send() {
  const c = document.getElementById('msgInput').value.trim();
  if (!c || !me) return;
  await supabaseClient.from('messages').insert([{
    from_id: me, content: c,
    type: mode === 'group' ? 'public' : 'private',
    to_id: mode === 'group' ? 'all' : privatePartner,
    mode: currentMode
  }]);
  document.getElementById('msgInput').value = '';
}

function showResetModal() { document.getElementById('resetModal').style.display = 'flex'; }
function closeResetModal() { document.getElementById('resetModal').style.display = 'none'; }

// 分开重置！！！
async function confirmReset() {
  if (document.getElementById('resetPwd').value !== ADMIN_PWD) return alert('密码错误');
  await supabaseClient.from('messages').delete().eq('mode', currentMode);
  await supabaseClient.from('players').delete().eq('mode', currentMode);
  await supabaseClient.from('private_requests').delete().eq('mode', currentMode);
  alert('重置成功');
  location.reload();
}
</script>
