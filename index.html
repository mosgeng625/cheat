<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名聊天室</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1a2e;color:#eee;font-family:Arial}
        #login{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
        #login input{padding:12px;width:200px;border:2px solid #e94560;background:#16213e;color:#fff;border-radius:8px;font-size:16px;text-align:center}
        #login button{padding:12px 40px;background:#e94560;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer}
        .error{color:#ff6b6b}
        #app{display:none;height:100vh;display:flex;flex-direction:column}
        #header{padding:15px;background:#16213e;display:flex;justify-content:space-between;align-items:center}
        #messages{flex:1;padding:20px;overflow-y:auto}
        .msg{background:#16213e;padding:10px 15px;margin:10px 0;border-radius:8px;max-width:80%}
        .msg-header{color:#e94560;font-size:12px;margin-bottom:5px}
        .msg-content{font-size:15px}
        #input-area{display:flex;padding:15px;background:#16213e}
        #msgInput{flex:1;padding:12px;border:1px solid #533483;background:#0f3460;color:#fff;border-radius:8px;font-size:15px}
        #sendBtn{padding:12px 20px;background:#e94560;color:white;border:none;border-radius:8px;cursor:pointer;margin-left:10px}
    </style>
</head>
<body>

<div id="login">
    <h1>🎭 匿名聊天室</h1>
    <input id="playerId" placeholder="输入1-8" maxlength="1">
    <button onclick="enterRoom()">进入房间</button>
    <p id="loginError" class="error"></p>
</div>

<div id="app">
    <div id="header">
        <span id="myId"></span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input id="msgInput" style="flex:1" onkeypress="if(event.key==='Enter')sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
// 配置区
const SUPABASE_URL = 'https://mronesaayjtjuhwvzouj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb25lc2FheWp0anVod3Z6b3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ4NzUsImV4cCI6MjA5MjE5MDg3NX0.rejXofvcyx8iwDBx-8p01xAgQxqAn0KcyS5boCnWkIY';

// 客户端
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: false }
});
let myId = null;

// 登录函数
async function enterRoom() {
  const input = document.getElementById('playerId').value.trim();
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';

  let num = input.replace(/[^\d]/g, '') || '1';
  num = Math.max(1, Math.min(8, parseInt(num) || 1));
  const id = num + '号';

  const thirtySecondsAgo = new Date(Date.now() - 30000).toISOString();
  const { data: existing } = await supabaseClient
    .from('players')
    .select('*')
    .eq('player_id', id)
    .gt('last_seen', thirtySecondsAgo)
    .maybeSingle();

  if (existing) {
    errorEl.textContent = '该编号已被使用，请换其他编号';
    return;
  }

  myId = id;

  await supabaseClient.from('players').upsert({
    player_id: id,
    last_seen: new Date().toISOString()
  });

  setInterval(() => {
    supabaseClient.from('players').upsert({
      player_id: id,
      last_seen: new Date().toISOString()
    });
  }, 10000);

  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myId').textContent = '我是：' + myId;

  await supabaseClient.from('messages').insert({
    type: 'system',
    from_id: 'system',
    to_id: 'all',
    content: myId + ' 进入了房间'
  });

  // 启动自动刷新
  startAutoRefresh();
}

// 强制自动刷新（核心修复）
function startAutoRefresh() {
  setInterval(async () => {
    await loadMessages();
  }, 500); // 每0.5秒刷新一次
}

// 加载消息
async function loadMessages() {
  const { data: messages } = await supabaseClient
    .from('messages')
    .select('*')
    .order('created_at', { ascending: true })
    .limit(100);

  const container = document.getElementById('messages');
  let html = '';
  messages.forEach(msg => {
    if (msg.type === 'system') {
      html += `<div style="text-align:center; color:#888; margin:10px 0; font-size:13px;">${msg.content}</div>`;
      return;
    }

    if (msg.type === 'private' && msg.from_id !== myId && msg.to_id !== myId) return;

    html += `
      <div class="msg">
        <div class="msg-header">${msg.from_id}</div>
        <div class="msg-content">${msg.content}</div>
      </div>
    `;
  });
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

// 发送消息
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !myId) return;

  await supabaseClient.from('messages').insert({
    type: 'public',
    from_id: myId,
    to_id: 'all',
    content: content
  });

  input.value = '';
  // 发送后立刻刷新
  await loadMessages();
}
</script>
</body>
</html>
